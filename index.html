<style>
  :root{
    --red:#8c1d18; --red-d:#701511; --red-soft:#f7ebea;
    --gray:#474e5c; --ink:#16171a; --muted:#6e7178;
    --line:#e6e6e1; --line-2:#efefec; --bg:#f6f6f3; --surface:#ffffff; --surface-2:#fafbfc;
    --panel:#ffffff; --panel2:#fafbfc; --txt:#16171a; --steel:#6e7178; --steel-2:#474e5c;
    --accent:#8c1d18;
    --ok:#1f7a4d; --warn:#b4690e; --sup:#8c1d18; --web:#b4690e; --blue:#1f5fae;
    --shadow:0 1px 2px rgba(20,24,32,.06),0 8px 24px rgba(20,24,32,.06);
    --mono:'JetBrains Mono',ui-monospace,monospace; --sans:'Archivo',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background-color:var(--bg);color:var(--txt);font-family:var(--sans);line-height:1.45;-webkit-font-smoothing:antialiased;padding-bottom:80px;font-size:14px;
  }
  /* ---- App bar (carimbo escuro com borda vermelha) ---- */
  .appbar{background:var(--ink);color:#fff;border-bottom:3px solid var(--red);position:sticky;top:0;z-index:40}
  .appbar .in{max-width:1180px;margin:0 auto;display:flex;align-items:center;gap:14px;padding:9px 18px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;font-size:13px;min-width:0}
  .brand .dot{width:7px;height:7px;background:var(--red);transform:rotate(45deg);flex:none}
  .brand b{color:var(--red);font-weight:800}
  .brand .sub{font-size:9px;color:#aeb4bd;text-transform:uppercase;letter-spacing:.18em;font-family:var(--mono);font-weight:500;margin-left:4px}
  .appbar .tag{margin-left:auto;font-family:var(--mono);font-size:10px;color:#aeb4bd;text-transform:uppercase;letter-spacing:1px;flex:none}
  .wrap{max-width:1180px;margin:22px auto 0;padding:0 18px}
  /* ---- Folha (cabeçalho da empresa) ---- */
  .sheet{background:var(--surface);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);overflow:hidden;margin-bottom:18px}
  .sheet .head{display:flex;justify-content:space-between;align-items:flex-start;gap:24px;padding:22px 26px 18px;border-bottom:1px solid var(--line);position:relative}
  .sheet .head::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:3px;background:linear-gradient(90deg,var(--red) 0 33%,var(--gray) 33% 66%,var(--red) 66% 100%)}
  .sheet .head .logo img{height:64px;display:block}
  .sheet .head .logo .mono{display:none;width:60px;height:60px;background:var(--red);border-radius:10px;align-items:center;justify-content:center;font-weight:800;font-size:20px;color:#fff}
  .sheet .head .co{text-align:right;font-size:12.5px;color:var(--muted);line-height:1.5}
  .sheet .head .co .nm{font-size:15px;font-weight:700;color:var(--ink);letter-spacing:.02em;margin-bottom:2px}
  .sheet .head .co .mut{font-family:var(--mono);font-size:11.5px}
  .sheet .head .co .doc-tag{display:inline-block;margin-top:6px;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--red);font-weight:700}
  .drop{border:1.5px dashed var(--line-2);border-radius:13px;padding:24px 16px;text-align:center;background:var(--surface);cursor:pointer;box-shadow:var(--shadow);transition:border-color .15s,background .15s}
  .drop:hover{border-color:var(--red)}
  .drop.hot{border-color:var(--red);background:var(--red-soft)}
  .drop b{display:block;font-size:15px;margin-bottom:3px;color:var(--ink)}
  .drop span{font-size:12px;color:var(--muted)}
  .drop input{display:none}
  .log{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:10px;white-space:pre-wrap;word-break:break-word;line-height:1.6}
  .log .ok{color:var(--ok)}.log .err{color:var(--red)}.log .warn{color:var(--warn)}
  h2.sec{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.16em;color:var(--steel-2);margin:24px 2px 10px;display:flex;align-items:center;gap:10px}
  h2.sec::before{content:"";width:14px;height:2px;background:var(--red);flex:none}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:12px;margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow)}
  .card .hd{padding:11px 13px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--line)}
  .card .hd .bar{width:4px;height:18px;border-radius:2px}
  .card .hd h3{font-size:13px;font-weight:700;color:var(--ink)}
  .card .hd .q{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--muted)}
  .card .bd{padding:11px 13px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .fld label{display:block;font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-bottom:4px;font-weight:700}
  .fld input,.fld select{width:100%;background:var(--surface-2);border:1.5px solid var(--line);border-radius:9px;color:var(--ink);font-family:var(--mono);font-size:14px;font-weight:600;padding:8px 10px}
  .fld input:focus,.fld select:focus{outline:none;border-color:var(--red);background:#fff;box-shadow:0 0 0 3px var(--red-soft)}
  .settings{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  @media(max-width:620px){.settings{grid-template-columns:repeat(2,1fr)}}
  .stage{background:#fbfbf9;border:1px solid var(--line);border-radius:12px;overflow:hidden;position:relative;touch-action:none;box-shadow:var(--shadow)}
  .stage svg{width:100%;height:auto;display:block}
  .zoom{position:absolute;top:8px;right:8px;display:flex;gap:6px}
  .zoom button{width:34px;height:34px;border:1px solid var(--line);background:#ffffffe6;color:var(--ink);border-radius:8px;font-size:18px;font-family:var(--mono);cursor:pointer;box-shadow:var(--shadow)}
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}
  .chip{display:flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:5px 10px;font-size:12px;cursor:pointer;color:var(--steel-2)}
  .chip.sel{border-color:var(--red);background:var(--red-soft);color:var(--ink)}
  .chip .dt{width:9px;height:9px;border-radius:50%}
  .chip select{background:transparent;border:none;color:inherit;font-size:12px;font-family:var(--sans)}
  table{width:100%;border-collapse:collapse;font-size:12px}
  th,td{text-align:left;padding:7px 6px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-weight:700;font-size:9.5px;text-transform:uppercase;letter-spacing:.1em}
  td{font-family:var(--mono);color:var(--ink)}
  td.n,th.n{text-align:right}
  td input{width:74px;background:var(--surface-2);border:1.5px solid var(--line);border-radius:6px;color:var(--ink);font-family:var(--mono);font-size:12px;padding:4px 6px;text-align:right}
  td input:focus{outline:none;border-color:var(--red);background:#fff;box-shadow:0 0 0 3px var(--red-soft)}
  .btn{display:inline-flex;align-items:center;gap:6px;background:var(--red);color:#fff;border:1px solid var(--red);border-radius:8px;padding:9px 14px;font-size:13px;font-weight:600;font-family:var(--sans);cursor:pointer;transition:.12s}
  .btn:hover{background:var(--red-d);border-color:var(--red-d)}
  .btn.ghost{background:var(--surface);border:1px solid var(--line-2);color:var(--steel-2)}
  .btn.ghost:hover{border-color:var(--red);color:var(--red);background:var(--red-soft)}
  .pill{display:inline-block;font-family:var(--mono);font-size:11px;background:var(--surface-2);border:1px solid var(--line);border-radius:6px;padding:2px 7px;color:var(--muted)}
  .total{background:var(--surface);border:1.5px solid var(--red);border-radius:13px;padding:15px;margin-top:6px;display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;box-shadow:var(--shadow)}
  .total .big{font-family:var(--mono);font-size:30px;font-weight:700;color:var(--red)}
  .total .m{font-size:12px;color:var(--muted)}
  .hide{display:none}
  .muted{color:var(--muted)}
  .hint{font-size:11px;color:var(--muted);margin-top:8px;line-height:1.5}
  .btnrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
  .obra-item{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:9px 11px;margin-bottom:8px;box-shadow:var(--shadow)}
  .obra-item .meta{flex:1}.obra-item .meta b{font-weight:700;font-size:13px;color:var(--ink)}
  .obra-item .dt{font-family:var(--mono);font-size:11px;color:var(--muted)}
  .obra-item button{background:var(--surface);border:1px solid var(--line-2);color:var(--steel-2);border-radius:7px;padding:5px 10px;font-size:12px;cursor:pointer}
  .obra-item button:hover{border-color:var(--red);color:var(--red)}
  #printArea{padding:20px;color:#111;background:#fff;border-radius:12px;margin-top:14px}
  #printArea h2{font-size:18px;margin:0 0 4px}
  #printArea table{width:100%;border-collapse:collapse;margin-top:8px}
  #printArea th,#printArea td{border:1px solid #ccc;padding:6px 8px;text-align:left;font-size:12px;color:#111}
  #printArea th{background:#f3f3f3}
  /* folha padrão Orçamento RM */
  .rm-sheet{background:#fff;border:1px solid #dadee3;border-radius:12px;overflow:hidden;color:#1d2127;font-family:Archivo,system-ui,sans-serif}
  .rm-head{display:flex;justify-content:space-between;align-items:flex-start;gap:24px;padding:22px 26px 18px;border-bottom:3px solid;border-image:linear-gradient(90deg,#aa221f 0 33%,#585758 33% 66%,#aa221f 66% 100%) 1;position:relative}
  .rm-head .rm-co{text-align:right;font-size:12.5px;color:#6c7480;line-height:1.5}
  .rm-head .rm-co .nm{font-size:15px;font-weight:700;color:#1d2127;margin-bottom:2px}
  .rm-head .rm-co .mut{font-family:'JetBrains Mono',monospace;font-size:11.5px}
  .rm-head .rm-co .doc-tag{display:inline-block;margin-top:6px;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#aa221f;font-weight:700}
  .rm-body{padding:18px 26px 24px}
  .rm-obra{display:flex;align-items:baseline;gap:10px;margin-bottom:12px;flex-wrap:wrap}
  .rm-obra span{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#6c7480}
  .rm-obra b{font-size:16px;color:#1d2127}
  .rm-obra .rm-date{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:12px;color:#6c7480}
  .rm-line{margin-top:8px;font-size:13px}
  .rm-total{display:flex;justify-content:space-between;align-items:baseline;margin-top:16px;padding-top:12px;border-top:2px solid #1d2127}
  .rm-total span{font-size:14px;font-weight:700}
  .rm-total b{font-family:'JetBrains Mono',monospace;font-size:20px;color:#aa221f}
  @media print{body{background:#fff;padding:0}body *{visibility:hidden}#printArea,#printArea *{visibility:visible}#printArea{position:absolute;left:0;top:0;width:100%;margin:0;border-radius:0;display:block!important}#printArea button{display:none}}
  /* ---- Telha (redesenho) ---- */
  .secttl-sm{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--steel-2);margin:0 0 8px;display:flex;align-items:center;gap:7px}
  .secttl-sm::before{content:"";width:10px;height:2px;background:var(--red);flex:none}
  .telha-pick{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--surface-2);border:1px solid var(--line);border-radius:9px;padding:10px 12px}
  .telha-pick .tp-info{min-width:0;display:flex;flex-direction:column;gap:2px}
  .telha-pick .tp-info b{font-size:13px;color:var(--ink);font-weight:700;line-height:1.25}
  .telha-pick .tp-info span{font-size:11px;color:var(--steel-2);font-family:var(--mono)}
  .telha-res{margin-top:16px;background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:4px 14px;overflow:hidden}
  .telha-res .tr-empty{padding:14px 0;text-align:center;color:var(--muted);font-size:13px}
  .telha-res .tr-line{display:flex;justify-content:space-between;align-items:baseline;gap:10px;padding:9px 0;border-bottom:1px solid var(--line-2)}
  .telha-res .tr-line span{font-size:13px;color:var(--steel-2)}
  .telha-res .tr-line b{font-family:var(--mono);font-size:14px;color:var(--ink);font-weight:600}
  .telha-res .tr-sub span{font-size:11.5px;color:var(--muted);font-family:var(--mono)}
  .telha-res .tr-sub b{font-size:13px;color:var(--steel-2)}
  .telha-res .tr-warn span{color:var(--warn);font-size:12px}
  .telha-res .tr-total{display:flex;justify-content:space-between;align-items:baseline;gap:10px;padding:12px 0 11px;border-bottom:0}
  .telha-res .tr-total span{font-size:13px;font-weight:700;color:var(--ink)}
  .telha-res .tr-total b{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--red)}
  /* barra trocar arquivo */
  .filebar{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:9px 12px;margin-bottom:14px}
  .filebar .fb-name{font-family:var(--mono);font-size:12px;color:var(--steel-2);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:flex;align-items:center;gap:7px}
  .filebar .fb-name::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--ok,#1f7a4d);flex:none}
  .btn.primary{background:var(--red);color:#fff;border-color:var(--red)}
  .btn.primary:hover{background:var(--red-d,#7d1714)}
</style>
</head>
<body>
  <div class="appbar">
    <div class="in">
      <div class="brand"><span class="dot"></span><span><b>RM</b> ESTRUTURAS</span><span class="sub">Corte de Estruturas</span></div>
      <span class="tag" id="ver">v12</span>
    </div>
  </div>
  <div class="wrap">

    <div class="sheet">
      <div class="head">
        <div class="logo"><img id="logoImg" alt="RM Estruturas" onerror="this.style.display='none';document.getElementById('logoMono').style.display='flex';"><div id="logoMono" class="mono">RM</div></div>
        <div class="co">
          <div class="nm">RM Estruturas Pré-Fabricadas</div>
          <div class="mut">Nunes e Kuhn Estruturas Metálicas Ltda</div>
          <div class="mut">Estrela · RS</div>
          <span class="doc-tag">Levantamento de Material</span>
        </div>
      </div>
    </div>

    <div class="entradas" style="display:flex;gap:12px;flex-wrap:wrap">
      <label class="drop" id="drop" style="flex:1;min-width:200px"><b>Abrir DWG</b><span>toque ou arraste · lê perfis e quantidades</span><input type="file" id="file" accept=".dwg,.dxf"></label>
      <label class="drop" id="dropCad" style="flex:1;min-width:200px"><b>📐 Importar CAD</b><span>arquivo do plugin · já com medidas</span><input type="file" id="fileCad" accept=".txt,.json"></label>
    </div>
    <div class="log" id="log"></div>

    <div id="app" class="hide">
      <div class="filebar"><span class="fb-name" id="fbName">arquivo carregado</span><button class="btn ghost" id="trocarArq">↩ trocar arquivo</button></div>
      <!-- AJUSTES -->
      <h2 class="sec">Ajustes</h2>
      <div class="fld" style="margin-bottom:8px"><label>Obra / Cliente</label><input id="obra" placeholder="ex.: Galpão Rogério"></div>
      <div class="settings">
        <div class="fld"><label>Unidade do DWG</label><select id="unit"><option value="10">cm → mm</option><option value="1">mm</option><option value="1000">m → mm</option></select></div>
        <div class="fld"><label>Quebra %</label><input id="quebra" type="number" value="10" inputmode="numeric"></div>
        <div class="fld"><label>Barra (mm)</label><input id="barra" type="number" value="6000" step="100" inputmode="numeric"></div>
        <div class="fld"><label>Galvanizado R$/kg</label><input id="galvkg" type="number" value="8.93" step="0.01" inputmode="decimal"></div>
      </div>

      <!-- FICHAS -->
      <h2 class="sec">Fichas lidas do desenho</h2>
      <div style="margin:-4px 0 8px;display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn ghost" id="diagBtn" style="font-size:11px;padding:4px 10px">🔍 ver textos lidos do DWG (diagnóstico)</button>
        <button class="btn ghost" id="impMedicoes" style="font-size:11px;padding:4px 10px">📐 Importar medições do AutoCAD</button>
        <input type="file" id="impMedFile" accept=".txt,.json" style="display:none">
      </div>
      <div id="diagPanel" class="hide" style="margin-bottom:12px;padding:12px;background:#fbfbf9;border:1px solid var(--line);border-radius:8px;font-size:12px"></div>
      <div id="fichas"></div>

      <!-- RESULTADO -->
      <h2 class="sec">Lista de compra</h2>
      <div class="card"><div class="bd" id="result" style="overflow-x:auto"></div></div>
      <div class="total"><span class="big" id="custoGeral">—</span><div class="m" style="display:flex;flex-direction:column;gap:2px"><span><b id="pesoTotal">0 kg</b> de aço</span><span id="totalMeta" class="muted"></span><span id="telhaTotal" class="muted"></span></div></div>
      <div class="btnrow">
        <button class="btn" id="copy">Copiar lista</button>
        <button class="btn ghost" id="print">Imprimir / PDF</button>
        <button class="btn ghost" id="cutReport">Relatório de corte ✂</button>
        <button class="btn ghost" id="saveObra">Salvar obra</button>
        <button class="btn primary" id="exportOrc">Importar p/ Orçamento RM</button>
      </div>

      <h2 class="sec">Obras salvas</h2>
      <div id="historico"></div>
    </div>
    <div id="printArea" class="hide"></div>
  </div>

async function init(){

    ['create(dir)',async()=>LibreDwg&&await LibreDwg.create(BASE+'/wasm/')],

  ];

  return null;
}

const P=p=>p?({x:p.x??p[0]??0,y:p.y??p[1]??0}):null;
const dist=(a,b)=>Math.hypot(b.x-a.x,b.y-a.y);
function collectEntities(db){if(Array.isArray(db))return db;for(const k of['entities','modelSpaceEntities','modelSpace'])if(Array.isArray(db?.[k]))return db[k];for(const k in db){const v=db[k];if(Array.isArray(v)&&v.length&&typeof v[0]==='object'&&'type'in v[0])return v;}return[];}
function segsOf(e){const t=(e.type||'').toUpperCase();
  if(t==='LINE'){const a=P(e.startPoint||e.start||e.vertices?.[0]),b=P(e.endPoint||e.end||e.vertices?.[1]);return a&&b?[[a,b]]:[];}
  if(t==='LWPOLYLINE'||t==='POLYLINE'){const v=(e.vertices||e.points||[]).map(P).filter(Boolean);const s=[];for(let i=0;i<v.length-1;i++)s.push([v[i],v[i+1]]);if((e.closed||e.isClosed)&&v.length>2)s.push([v[v.length-1],v[0]]);return s;}
  return[];}
function textOf(e){const t=(e.type||'').toUpperCase();
  if(t==='TEXT'||t==='MTEXT'||t==='ATTRIB'||t==='ATTDEF')
    return e.text??e.textValue??e.contents??e.string??e.value??e.defaultValue??e.tag??null;
  return null;}
function textsDeep(e,out){
  const direct=textOf(e);
  if(direct!=null&&(''+direct).trim()){const pos=P(e.insertionPoint||e.position||e.startPoint||e.basePoint||e.location||e.attachmentPoint||e.insertPoint)||{x:0,y:0};out.push({s:(''+direct).trim(),x:pos.x,y:pos.y});}
  const attrs=e.attributes||e.attribs||e.attrib||e.atts;
  if(Array.isArray(attrs))for(const a of attrs){const v=a.text??a.textValue??a.value??a.contents??a.string;if(v!=null&&(''+v).trim()){const pos=P(a.position||a.insertionPoint||e.insertionPoint||e.position)||{x:0,y:0};out.push({s:(''+v).trim(),x:pos.x,y:pos.y});}}
  const kids=e.entities||e.children;
  if(Array.isArray(kids))for(const k of kids)textsDeep(k,out);
}

// Lê o mesmo cadastro do Orçamento RM (localStorage compartilhado no domínio do GitHub Pages).
const ORC_KEYS=['rm_orc_db_v1','rm_orc_v1'];
let PRECOS={ok:false,telhas:[],perfis:[],rkg:{},laminados:[],fornecedor:'',densidade:8000};
// largura útil padrão por tipo de telha (m) — editável na interface
const LARG_UTIL={'TP-40':1.02,'TP-7':1.02,'ONDULADA':0.98,'TERMICA':1.02,'TÉRMICA':1.02};

function loadPrecos(){
  let db=null;
  for(const k of ORC_KEYS){
    try{const d=localStorage.getItem(k);if(d){db=JSON.parse(d);if(db&&(db.telhas||db.perfis))break;}}catch(e){}
  }
  if(!db){PRECOS={ok:false,telhas:[],perfis:[],rkg:{},laminados:[],fornecedor:'',densidade:8000};return false;}
  // R$/kg por espessura (fornecedor ativo, senão o primeiro)
  const rkg={};let fnome='';
  const forns=db.fornecedores||[];
  const fAtivo=forns.find(f=>f.id===db.fornecedorAtivo)||forns[0];
  if(fAtivo&&fAtivo.precos){Object.assign(rkg,fAtivo.precos);fnome=fAtivo.nome||'';}
  // laminados/tubos: itens vendidos por BARRA (cantoneiras, barras chatas, etc.)
  const laminados=[];
  for(const c of (db.categorias||[])){
    for(const it of (c.items||[])){
      if((it.unidade||'').toLowerCase()==='barra' && it.valor)
        laminados.push({desc:it.desc,grupo:it.grupo,valor:it.valor,comp:it.comp||6000,cat:c.nome});
    }
  }
  PRECOS={ok:true,telhas:db.telhas||[],perfis:db.perfis||[],rkg,laminados,fornecedor:fnome,densidade:db.densidade||8000};
  return true;
}
// rótulo legível de um perfil do cadastro: "U 25x50x25 #2,00 · galvanizado"
function perfilLabel(p){
  const grp=(p.grupo||'').toUpperCase();
  const mat=grp.includes('GALV')?'galvanizado':'carbono';
  const tipo=(p.tipo||(grp.startsWith('UE')?'UE':'U'));
  const dims=(p.dims||'').replace(/\s+/g,'');
  return tipo+' '+dims+(p.esp?' #'+p.esp:'')+' · '+mat;
}
// perfis filtrados por tipo: 'U' (banzo) ou 'UE' (terça)
function perfisPorTipo(tipo){
  return (PRECOS.perfis||[]).filter(p=>{
    const g=(p.grupo||'').toUpperCase();
    return tipo==='UE' ? g.startsWith('UE') : (g.startsWith('U ')||g.startsWith('U C')||g.startsWith('U G'));
  });
}
// normaliza espessura ("2,65" / "2.65" / 2.65) -> chave do cadastro ("2,65")
function espKey(s){if(s==null)return '';const v=(''+s).replace('.',',').replace(/[^0-9,]/g,'');return v;}
// R$/kg para um perfil pela espessura; 0 se não achar
function rkgPorEsp(esp){const k=espKey(esp);if(PRECOS.rkg[k]!=null)return PRECOS.rkg[k];
  // tenta aproximar trocando vírgula/ponto

// extrai a espessura de um nome de perfil ("100x40x15 #2,70" -> "2,70")
function espDoPerfil(nome){const s=(nome||'');
  // 1) com # explícito: "#2,70"
  let m=s.match(/#\s*([0-9]+[.,][0-9]+)/);if(m)return m[1];
  // 2) espessura é sempre decimal com vírgula (ex.: 3,00 / 2,65) — dimensões são inteiras (100x50x25)
  m=s.match(/([0-9]+,[0-9]{2})(?!\d)/);if(m)return m[1];
  // 3) fallback: decimal com ponto
  m=s.match(/([0-9]+\.[0-9]{2})(?!\d)/);return m?m[1].replace('.',','):'';}

function num(s){return parseFloat((s+'').replace(',','.'));}
function cleanProfile(s){return (s||'').replace(/\(.*?\)/g,'').replace(/\s+/g,' ').trim();}

// Infere tipo de perfil (U / UE) quando não há prefixo explícito.
// Ex: "40x100 x 3,00"    → "U 100x40 #3,00"
//     "100x40x15 - 1,95" → "UE 100x40x15 #1,95"
//     "30x93x 2,65"      → "UE 30x93x2,65"
function normalizeProfileLine(raw){
  let s=(raw||'').trim();
  // remove palavras descritivas no início (ex.: "Perfil U 50x150x50" → "U 50x150x50")
  s=s.replace(/^\s*(perfil|perfis|peça|peca|barra)\s+/i,'').trim();
  // Se já começa com tipo conhecido (U, UE, L), normaliza a espessura
  if(/^(UE?|L)\b/i.test(s)){
    // "UE 100x40x15 - 1,95" → "UE 100x40x15 #1,95"
    s=s.replace(/\s*-\s*(\d+[.,]\d+)(?=\s*(?:\(|$))/,' #$1');
    // se ainda não tem #, mas há um decimal solto no fim (ex.: "UE 100x40x15 1,95"), vira espessura
    if(!/#/.test(s)){
      s=s.replace(/\s+(\d+[.,]\d+)\s*$/,' #$1');
    }
    return s;
  }
  // Sem prefixo: linha só com dimensões
  // 1) Extrai a espessura: número com VÍRGULA decimal (ex: 3,00 / 1,95 / 2,65)
  //    ou precedido de " - " ou " #"
  let esp='';
  // tenta " - decimal" ou " #decimal" primeiro
  let rest=s;
  const mEsp=s.match(/(?:\s*[-#]\s*)(\d+[.,]\d+)(?=\s*(?:\(|$|\s))/);
  if(mEsp){esp=mEsp[1].replace('.',',');rest=s.slice(0,mEsp.index).trim();}
  else{
    // espessura = o último número que contém vírgula ou ponto decimal
    const mDec=s.match(/(\d+[.,]\d+)(?=[^0-9]*$)/);
    if(mDec){esp=mDec[1].replace('.',',');rest=s.slice(0,mDec.index).trim();}
  }
  // 2) Extrai dimensões inteiras do restante
  const dims=(rest.match(/\d+/g)||[]).map(Number).filter(n=>n>0);
  if(!dims.length)return raw; // não reconheceu
  // 3) Infere tipo: 3 dimensões inteiras = UE (enrijecido), 2 = U
  const tipo=dims.length>=3?'UE':'U';
  const espStr=esp?(' #'+esp):'';
  return tipo+' '+dims.join('x')+espStr;
}
function kgmEstimate(prof){
  const nums=(prof.match(/\d+(?:[.,]\d+)?/g)||[]).map(num);
  if(nums.length<2)return 0;
  const thick=nums.find(n=>!Number.isInteger(n))??nums[nums.length-1];
  const dims=nums.filter(n=>n!==thick);
  let dev=0;
  if(dims.length>=3)dev=dims[0]+2*dims[1]+2*dims[2];
  else if(dims.length===2)dev=dims[0]+2*dims[1];
  else dev=dims[0];
  return +(dev*thick*0.00785).toFixed(2); // kg/m (mm,mm)
}

// Normaliza nome → chave de catálogo: "UE 150x60x20 #2,65" → "UE 150X60X20X2,65"
function kgmCatKey(prof){
  let s=(prof||'').toUpperCase().replace(/\s+/g,' ').trim();
  // extrai tipo (U, UE, L)
  let tipo='';
  if(/^UE\b/.test(s)){tipo='UE';s=s.replace(/^UE\s*/,'');}
  else if(/^U\b/.test(s)){tipo='U';s=s.replace(/^U\s*/,'');}
  else if(/^L\b/.test(s)||/CANTONEIRA/i.test(s)){tipo='L';s=s.replace(/^L\s*/i,'').replace(/CANTONEIRA\s*/i,'');}
  else return null;
  // extrai todos os números
  const nums=(s.match(/\d+(?:[.,]\d+)?/g)||[]).map(n=>n.replace('.',','));
  if(nums.length<2)return null;
  return tipo+' '+nums.join('X');
}
// Busca peso no catálogo; retorna {kgm, source:'catalogo'|'estimado'}
// Busca o perfil no banco do Orçamento RM (PRECOS.perfis) e calcula kg/m pelo slitter.
// Esta é a fonte primária: usa o que o usuário cadastrou (slitter + espessura).
function kgmDoBanco(prof){
  const p=achaPerfilBanco(prof);
  if(!p)return null;
  const dens=PRECOS.densidade||8000;
  const espNum=num(p.esp)||0;
  if(p.slitter&&espNum)return {kgm:(p.slitter*espNum*dens)/1e6, source:'catalogo'};
  if(p.peso&&p.comp)return {kgm:p.peso/(p.comp/1000), source:'catalogo'};
  return null;
}
function kgmLookup(prof){
  // 1º: banco do Orçamento RM (slitter cadastrado pelo usuário) — fonte primária
  const banco=kgmDoBanco(prof);
  if(banco)return banco;
  // 2º: catálogo fixo embutido
  const key=kgmCatKey(prof);
  if(key && KGM_CATALOGO[key]!=null) return {kgm:KGM_CATALOGO[key], source:'catalogo'};
  // 3º: estimativa (último recurso)
  return {kgm:kgmEstimate(prof), source:'estimado'};
}

// Encontra o objeto do perfil no banco do Orçamento que casa com o nome (tipo+dims+esp)
function achaPerfilBanco(prof){
  if(!PRECOS.ok||!PRECOS.perfis||!PRECOS.perfis.length)return null;
  const s=(prof||'').toUpperCase().replace(/\s+/g,' ').trim();
  let tipo='';let resto=s;
  if(/^UE\b/.test(s)){tipo='UE';resto=s.replace(/^UE\s*/,'');}
  else if(/^U\b/.test(s)){tipo='U';resto=s.replace(/^U\s*/,'');}
  else if(/^L\b/.test(s)||/CANTONEIRA/i.test(s)){tipo='L';resto=s.replace(/^L\s*/i,'').replace(/CANTONEIRA\s*/i,'');}
  else return null;
  let esp='';const mEsp=resto.match(/#\s*(\d+(?:[.,]\d+)?)/);
  if(mEsp){esp=mEsp[1];resto=resto.slice(0,mEsp.index);}
  const dnums=(resto.match(/\d+/g)||[]).join('X');
  if(!dnums)return null;
  const alvo=tipo+' '+dnums+' #'+esp.replace('.',',');
  for(const p of PRECOS.perfis){
    const ptipo=(p.tipo||((p.grupo||'').toUpperCase().startsWith('UE')?'UE':'U'));
    const pdims=(p.dims||'').match(/\d+/g);
    const pkey=ptipo+' '+(pdims?pdims.join('X'):'')+' #'+(p.esp||'').replace('.',',');
    if(pkey===alvo)return p;
  }
  return null;
}
function ehDupla(txt){const s=' '+(txt||'')+' ';
  // termos textuais inequívocos de duplo
  if(/\bdupl[ao]s?\b|\bem\s+duplo\b|cantoneira\s*dupl|geminad[ao]/i.test(s))return true;
  // multiplicador "2x" / "x2" / "× 2" — só quando isolado (não colado a dimensão tipo x2,65)
  if(/(^|[\s(])2\s*[x×](?![0-9.,])/i.test(s))return true;          // "2x" no início de um trecho
  if(/[x×]\s*2(?![0-9.,])(?=[\s)]|$)/i.test(s)&&!/\d[x×]\s*2\b/i.test(s))return true; // "× 2" isolado
  if(/\(\s*2\s*\)/.test(s))return true;                            // "(2)"
  if(/\b2\s*(un|pe[çc]|pç)/i.test(s))return true;                  // "2 un" / "2 peças"
  return false;}
function ehCant(txt){return /cantoneira|cant\.|\bcant\b/i.test(txt||'');}
// LISTA BRANCA: só processa fichas destes tipos estruturais. Aceita sufixos (TESOURA 2, PILAR B, etc.)
function ehTipoConhecido(nome){
  const n=(nome||'').toUpperCase();
  // tesoura · pilar · treliça/treliçado/trelica · terça/terca/TCA/T.C.A. · calha · contraventamento
  // (telha NÃO entra aqui: é calculada pela área da planta baixa, não por ficha de texto)
  // \b no início garante que pega "TESOURA 2", "PILAR-B", "TRELIÇA 02" etc. (palavra + qualquer sufixo)
  return /\b(tesoura|pilar|treli[çc]ad?o?|trelica|terç[ao]|terca|t\.?c\.?a\.?|calha|contravent)/i.test(n);
}
function ehIgnorar(nome){ return !ehTipoConhecido(nome); }
// Agrupa TEXTs soltos (1 linha cada) em blocos por proximidade espacial.
// MTEXT multilinha (já tem \P ou \n) é mantido como bloco próprio.
function agruparTextos(txts){
  if(!txts.length)return [];
  // separa: multilinha (já completos) vs linha-única (candidatos a agrupar)
  const multi=[], unicos=[];
  for(const t of txts){
    if(/\\P|\n/.test(t.s)) multi.push(t);
    else unicos.push(t);
  }
  if(!unicos.length) return multi;
  // estima a altura de linha típica pela distribuição vertical dos textos
  const ys=unicos.map(t=>t.y).sort((a,b)=>a-b);
  let difs=[];for(let i=1;i<ys.length;i++){const d=Math.abs(ys[i]-ys[i-1]);if(d>0.01)difs.push(d);}
  difs.sort((a,b)=>a-b);
  const linha=difs.length?difs[Math.floor(difs.length*0.3)]:50; // ~altura de uma linha
  const tolX=Math.max(linha*8, 200); // mesma coluna: X próximo
  const tolY=Math.max(linha*2.2, 30); // linhas consecutivas: Y próximo
  // agrupa: ordena por X depois Y; junta textos alinhados verticalmente e próximos
  const usados=new Array(unicos.length).fill(false);
  const blocos=[];
  // ordena por Y desc (de cima p/ baixo, como se lê)
  const idx=unicos.map((_,i)=>i).sort((a,b)=> (unicos[b].y-unicos[a].y) || (unicos[a].x-unicos[b].x));
  for(const i of idx){
    if(usados[i])continue;
    const base=unicos[i];usados[i]=true;
    const grupo=[base];
    // procura linhas abaixo na mesma coluna
    let cy=base.y;
    let achou=true;
    while(achou){
      achou=false;
      for(const j of idx){
        if(usados[j])continue;
        const c=unicos[j];
        if(Math.abs(c.x-base.x)<=tolX && (cy-c.y)>0 && (cy-c.y)<=tolY){
          grupo.push(c);usados[j]=true;cy=c.y;achou=true;break;
        }
      }
    }
    // monta o bloco juntando as linhas (de cima p/ baixo)
    grupo.sort((a,b)=>b.y-a.y);
    blocos.push({s:grupo.map(g=>g.s).join('\n'), x:base.x, y:base.y});
  }
  return multi.concat(blocos);
}
// Parseia UM texto de ficha (multilinha, separado por \P ou \n ou /) → {nome,profiles,duplas,cants,qty,comp} ou null
function parseUmTexto(raw){
  const lines=raw.split(/\\P|\n|\s\/\s/).map(l=>l.replace(/\\[A-Za-z][^;]*;/g,'').replace(/[{}]/g,'').trim()).filter(Boolean);
  if(!lines.length)return null;
  let nomeIdx=lines.findIndex(l=>ehTipoConhecido(l.toUpperCase()));
  if(nomeIdx<0)return null;
  const nome=lines[nomeIdx].toUpperCase();
  const profiles=[],duplas=[],cants=[];let qty=1,comp=null;
  for(let i=0;i<lines.length;i++){
    if(i===nomeIdx)continue;
    let l=lines[i];
    if(/quantidade|qtde|qtd|quant/i.test(l)){
      const m=l.match(/(\d+)/);if(m)qty=+m[1];
      const cmq=l.match(/\((\d+(?:[.,]\d+)?)\s*m\)/i)||l.match(/(\d+(?:[.,]\d+)?)\s*m\b/i);
      if(cmq)comp=num(cmq[1]);
      continue;
    }
    if(ehTipoConhecido(l.toUpperCase()))continue;
    const cm=l.match(/(?:\(|\b)(\d+(?:[.,]\d+)?)\s*m\b\)?/i)||l.match(/(?:L\s*=|comp\w*\s*:?)\s*(\d+(?:[.,]\d+)?)/i);
    if(cm){comp=num(cm[1]);l=l.replace(cm[0],' ').trim();}
    if(/x/i.test(l)&&/\d/.test(l)){
      const lNorm=normalizeProfileLine(l);
      const cp=cleanProfile(lNorm);
      if(cp)profiles.push(cp),duplas.push(ehDupla(l)),cants.push(ehCant(l));
    }
  }
  return {nome,profiles,duplas,cants,qty,comp};
}
function parseFichas(){
  FICHAS=[];
  const blocos=agruparTextos(TXT);
  for(const t of blocos){
    const f=parseUmTexto(t.s);
    if(!f)continue;
    FICHAS.push({nome:f.nome,profiles:f.profiles,duplas:f.duplas,cants:f.cants,lam:[],mat:[],esp:[],qty:f.qty,comp:f.comp,cluster:-1,banzoMM:0,intMM:0,tx:{x:t.x,y:t.y}});
  }
}

function bbox(idxs){let mnx=Infinity,mny=Infinity,mxx=-Infinity,mxy=-Infinity;for(const i of idxs){for(const p of[SEG[i].a,SEG[i].b]){mnx=Math.min(mnx,p.x);mny=Math.min(mny,p.y);mxx=Math.max(mxx,p.x);mxy=Math.max(mxy,p.y);}}return{mnx,mny,mxx,mxy,w:mxx-mnx,h:mxy-mny};}
let CELL=0.013; // tamanho da célula como fração do desenho (sensibilidade)
function cluster(){
  for(const k in FORCE)delete FORCE[k];
  const n=SEG.length;if(!n){CL=[];return;}
  const all=bbox([...Array(n).keys()]);
  const cell=Math.max(all.w,all.h)*CELL||1;
  const cols=Math.max(1,Math.ceil(all.w/cell)+1),rows=Math.max(1,Math.ceil(all.h/cell)+1);
  const cx=x=>Math.min(cols-1,Math.max(0,Math.floor((x-all.mnx)/cell)));
  const cy=y=>Math.min(rows-1,Math.max(0,Math.floor((y-all.mny)/cell)));
  const ci=(c,r)=>r*cols+c;
  // marca células ocupadas por cada segmento (amostrando ao longo dele)
  const cellSegs=new Map();
  for(let i=0;i<n;i++){const s=SEG[i];const steps=Math.max(1,Math.ceil(dist(s.a,s.b)/cell));
    for(let t=0;t<=steps;t++){const x=s.a.x+(s.b.x-s.a.x)*t/steps,y=s.a.y+(s.b.y-s.a.y)*t/steps;const k=ci(cx(x),cy(y));if(!cellSegs.has(k))cellSegs.set(k,new Set());cellSegs.get(k).add(i);}}
  // componentes conectados das células (8 vizinhos) = regiões espaciais
  const visited=new Set();const comps=[];
  for(const start of cellSegs.keys()){
    if(visited.has(start))continue;visited.add(start);
    const stack=[start];const segSet=new Set();
    while(stack.length){const k=stack.pop();const r=Math.floor(k/cols),c=k-r*cols;
      for(const i of (cellSegs.get(k)||[]))segSet.add(i);
      for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){if(!dr&&!dc)continue;const nr=r+dr,nc=c+dc;if(nr<0||nc<0||nr>=rows||nc>=cols)continue;const nk=ci(nc,nr);if(cellSegs.has(nk)&&!visited.has(nk)){visited.add(nk);stack.push(nk);}}}
    comps.push([...segSet]);
  }
  const totArea=(all.w*all.h)||1;
  CL=[];let id=0;
  for(const idxs of comps){
    const bb=bbox(idxs);let len=0;const lc={};
    for(const i of idxs){len+=dist(SEG[i].a,SEG[i].b);lc[SEG[i].layer]=(lc[SEG[i].layer]||0)+1;}
    const layer=Object.entries(lc).sort((a,b)=>b[1]-a[1])[0][0];
    const aspect=Math.max(bb.w,bb.h)/(Math.min(bb.w,bb.h)||1);
    const areaFrac=(bb.w*bb.h)/totArea;
    let role='ignorar';
    if(/pilar/i.test(layer))role='pilar';
    // trelica/treliça no layer: vertical=pilar, horizontal=tesoura
    else if(/treli[çc]/i.test(layer)){role=(bb.h>bb.w*1.3)?'pilar':'tesoura';}
    else if(idxs.length<=10&&aspect<6&&areaFrac>0.02)role='telha';
    else if(aspect>=4&&idxs.length>=8){role=(bb.h>bb.w*1.3)?'pilar':'tesoura';}
    CL.push({idxs,bb,len,layer,aspect,role,id});id++;
  }
  CL.sort((a,b)=>b.len-a.len);CL.forEach((c,i)=>c.id=i);
  CL.forEach(c=>c.idxs.forEach(i=>SEG[i].cl=c.id));
  telha.manual=false;
  autoLinkFichas();
}
function autoLinkFichas(){
  FICHAS.forEach(f=>f.cluster=-1);
  FICHAS.forEach((f,fi)=>{
    let role=null;
    // TERÇA: qualquer variação de nome → vínculo de comprimento, não cluster
    if(/terç[ao]|terca|tca\b|t\.c\.a\.|terça\s*simples/i.test(f.nome))return;
    // PILAR: nome contém "pilar" explícito, ou contém trelica/treliça COM pilar
    if(/pilar/i.test(f.nome)||/pilar[\s-]*treli[çc]/i.test(f.nome))role='pilar';
    // TESOURA: nome contém tesoura ou trelica/treliça SEM pilar
    else if(/tesoura|treli[çc]/i.test(f.nome))role='tesoura';
    if(!role)return;
    // override manual: você marcou um grupo como tesoura/pilar -> mede aquele
    if(FORCE[fi]!=null&&CL[FORCE[fi]]){const c=CL[FORCE[fi]];c.role=role;f.cluster=c.id;splitBanzo(f);return;}
    // Para pilares: prefere clusters com aspect ratio VERTICAL (h >> w)
    // Para tesouras: prefere clusters com aspect ratio HORIZONTAL (w >> h) ou inclinado
    const cand=CL.filter(c=>c.role===role||(role==='pilar'&&c.role==='ignorar'&&c.bb.h>c.bb.w*1.5)||(role==='tesoura'&&c.role==='ignorar'&&c.bb.w>c.bb.h*1.5));
    const candFiltrado=CL.filter(c=>c.role===role);
    const usarCand=candFiltrado.length?candFiltrado:cand;
    if(!usarCand.length)return;
    // Vincula pela PROXIMIDADE ESPACIAL entre texto da ficha e centro do cluster
    const best=usarCand.slice().sort((a,b)=>{
      const cxa=(a.bb.mnx+a.bb.mxx)/2, cya=(a.bb.mny+a.bb.mxy)/2;
      const cxb=(b.bb.mnx+b.bb.mxx)/2, cyb=(b.bb.mny+b.bb.mxy)/2;
      const da=Math.hypot(f.tx.x-cxa,f.tx.y-cya);
      const db=Math.hypot(f.tx.x-cxb,f.tx.y-cyb);
      return da-db;
    })[0];
    f.cluster=best.id;splitBanzo(f);
  });
  // tesoura/pilar não vinculado (vista 2D, cópias) vira "ignorar"
  const linked=new Set(FICHAS.filter(f=>f.cluster>=0).map(f=>f.cluster));
  for(const c of CL){if((c.role==='tesoura'||c.role==='pilar')&&!linked.has(c.id))c.role='ignorar';}
}

/* ===================== SPLIT BANZO×INTERNO (ângulo) ===================== */
// Para PILAR (vertical): banzo = segmentos verticais; interno = diagonais/horizontais
// Para TESOURA (horizontal): banzo = segmentos horizontais/inclinados; interno = diagonais/verticais
function splitBanzo(f){
  const c=CL[f.cluster];if(!c){f.banzoMM=0;f.intMM=0;return;}
  const isPilar=c.role==='pilar'||/pilar/i.test(f.nome);

  // ----- MÉTODO 1: Continuidade geométrica (polyline detection) -----
  // Monta grafo de adjacência: endpoints que coincidem dentro de snap tolerance
  const snapTol=Math.max(c.bb.w,c.bb.h)*0.005||0.5; // 0.5% do bbox
  const idxs=c.idxs;
  const eps=[]; // [{x,y,segIdx,end:'a'|'b'}, ...]
  for(const i of idxs){eps.push({x:SEG[i].a.x,y:SEG[i].a.y,si:i,e:'a'});eps.push({x:SEG[i].b.x,y:SEG[i].b.y,si:i,e:'b'});}

  // Encontra caminhos contínuos (polylines) via DFS
  // adj: segIdx -> [segIdx vizinhos por endpoint coincidente]
  const adj=new Map();
  for(const i of idxs) adj.set(i,[]);
  for(let a=0;a<eps.length;a++){
    for(let b=a+1;b<eps.length;b++){
      if(eps[a].si===eps[b].si) continue;
      if(Math.hypot(eps[a].x-eps[b].x,eps[a].y-eps[b].y)<=snapTol){
        adj.get(eps[a].si).push(eps[b].si);
        adj.get(eps[b].si).push(eps[a].si);
      }
    }
  }

  // Encontra os dois caminhos mais longos (candidatos a banzo superior e inferior)
  const visited=new Set();
  const paths=[];
  function dfsPath(start){
    const stack=[[start,[start]]];const best=[];
    const vis2=new Set([start]);
    while(stack.length){
      const [cur,path]=stack.pop();
      best.push([...path]);
      for(const nb of (adj.get(cur)||[])){
        if(!vis2.has(nb)){vis2.add(nb);stack.push([nb,[...path,nb]]);}
      }
    }
    // o caminho mais longo encontrado
    best.sort((a,b)=>b.length-a.length);
    return best[0]||[];
  }

  // Encontra todos os caminhos contínuos (componentes lineares)
  const chains=[];
  const usedForChain=new Set();
  // Acha endpoints de grau 1 (pontas de cadeia) ou grau ≠ 2 (nós)
  const degree=new Map();
  for(const i of idxs){const d=(adj.get(i)||[]).length;degree.set(i,d);}
  // Começa pelos endpoints (grau 1 ou grau 0)
  const starts=idxs.filter(i=>(degree.get(i)||0)<=1).sort((a,b)=>(degree.get(a)||0)-(degree.get(b)||0));
  for(const s of starts){
    if(usedForChain.has(s))continue;
    const chain=dfsPath(s);
    if(chain.length>=2){chains.push(chain);chain.forEach(i=>usedForChain.add(i));}
  }
  // Segmentos restantes que não entraram em nenhuma cadeia
  for(const i of idxs){if(!usedForChain.has(i)){chains.push([i]);usedForChain.add(i);}}

  // Ordena cadeias por comprimento total decrescente
  chains.sort((a,b)=>{
    const lenOf=arr=>arr.reduce((s,i)=>s+dist(SEG[i].a,SEG[i].b),0);
    return lenOf(b)-lenOf(a);
  });

  // As duas cadeias mais longas = banzos; resto = internos
  const banzoSet=new Set();
  const topChains=chains.slice(0,2);
  for(const ch of topChains) for(const i of ch) banzoSet.add(i);

  // Verifica se a detecção geométrica é plausível
  // (se os banzos contêm entre 15% e 85% do comprimento total, a detecção é boa)
  let banzoLen=0,totalLen=0;
  for(const i of idxs){const L=dist(SEG[i].a,SEG[i].b);totalLen+=L;if(banzoSet.has(i))banzoLen+=L;}
  const ratio=totalLen>0?banzoLen/totalLen:0;
  // PILAR: a detecção por cadeias confunde diagonais em zigue-zague com banzo.
  // No pilar vertical, o ângulo separa melhor (banzo=vertical). Então pulamos o método geométrico.
  const geoOK=!isPilar && ratio>=0.15 && ratio<=0.85 && topChains[0]?.length>=2;

  if(geoOK){
    // Usar detecção geométrica
    let banzo=0,intr=0;const intLens=[],banzoLens=[];
    for(const i of idxs){
      const s=SEG[i];
      s.cat=banzoSet.has(i)?1:2;
      const L=dist(s.a,s.b)*unitF;
      if(s.cat===1){banzo+=L;banzoLens.push(L);}else{intr+=L;intLens.push(L);}
    }
    f.banzoMM=banzo;f.intMM=intr;f.intLens=intLens;f.banzoLens=banzoLens;
    return;
  }

  // ----- MÉTODO 2 (fallback): Ângulo com limiar parametrizado pelo telhado -----
  const angTelhado=num(document.getElementById('angtelhado')?.value)||10;
  // Para PILAR: horizontal = a estrutura se estende verticalmente
  //   banzo = segmentos próximos de 90° (verticais) 
  //   interno = diagonais e horizontais
  // Para TESOURA: lógica original
  const limiar=angTelhado+12; // margem de 12° acima da inclinação do telhado
  let banzo=0,intr=0;const intLens=[],banzoLens=[];
  for(const i of idxs){
    const s=SEG[i];const ang=Math.abs(Math.atan2(s.b.y-s.a.y,s.b.x-s.a.x)*180/Math.PI);
    const a=Math.min(ang,180-ang);
    let flat;
    if(isPilar){
      flat=(a>=75);
    }else{
      const horizontal=c.bb.w>=c.bb.h;
      flat=horizontal?(a<=limiar):(a>=(90-limiar));
    }
    s.cat=flat?1:2;
    const L=dist(s.a,s.b)*unitF;
    if(flat){banzo+=L;banzoLens.push(L);}else{intr+=L;intLens.push(L);}
  }
  f.banzoMM=banzo;f.intMM=intr;f.intLens=intLens;f.banzoLens=banzoLens;
}
function invert(f){const c=CL[f.cluster];if(!c)return;let b=0,it=0;const intLens=[],banzoLens=[];for(const i of c.idxs){const s=SEG[i];s.cat=s.cat===1?2:1;const L=dist(s.a,s.b)*unitF;if(s.cat===1){b+=L;banzoLens.push(L);}else{it+=L;intLens.push(L);}}f.banzoMM=b;f.intMM=it;f.intLens=intLens;f.banzoLens=banzoLens;}

function fitVB(){const bb=bbox([...Array(SEG.length).keys()]);const pad=Math.max(bb.w,bb.h)*0.04;VB={x:bb.mnx-pad,y:bb.mny-pad,w:bb.w+2*pad,h:bb.h+2*pad};}

    if(sel)col='var(--red)';

  }
  // caixas clicáveis por cluster
  for(const c of CL){const x=sx(c.bb.mnx),y=sy(c.bb.mxy),w=(c.bb.w/VB.w*W),h=(c.bb.h/VB.h*H);
    s+='<rect data-cl="'+c.id+'" x="'+(x-4).toFixed(1)+'" y="'+(y-4).toFixed(1)+'" width="'+(w+8).toFixed(1)+'" height="'+(h+8).toFixed(1)+'" fill="transparent" stroke="'+(selCluster===c.id?'#aa221f99':'transparent')+'" stroke-dasharray="4 3"/>';}
  svg.setAttribute('viewBox','0 0 '+W+' '+H.toFixed(0));
  svg.innerHTML=s;
  svg.querySelectorAll('rect[data-cl]').forEach(r=>r.addEventListener('click',()=>{selCluster=+r.getAttribute('data-cl');renderAll();}));
}

/* ===================== FIRST FIT DECREASING (otimização de corte) ===================== */
function ffdCutBars(pieces, barLen){
  // pieces = [{len: mm, qty: n}, ...], barLen = mm
  // Expande em lista individual, ordena decrescente, aloca por FFD
  const expanded=[];
  for(const p of pieces) for(let i=0;i<p.qty;i++) expanded.push(p.len);
  expanded.sort((a,b)=>b-a);
  const bins=[]; // cada bin = restante livre na barra
  for(const pc of expanded){
    let placed=false;
    for(let i=0;i<bins.length;i++){
      if(bins[i]>=pc){bins[i]-=pc;placed=true;break;}
    }
    if(!placed) bins.push(barLen-pc);
  }
  return bins.length; // nº de barras necessárias
}
// Para peças contínuas (contMM com quebra), gera cortes iguais de comprimento médio
function ffdFromContinuous(totalMM, avgPieceLen, barLen){
  if(totalMM<=0) return 0;
  if(avgPieceLen<=0 || avgPieceLen>barLen) return Math.ceil(totalMM/barLen);
  const nPieces=Math.round(totalMM/avgPieceLen);
  if(nPieces<=0) return Math.ceil(totalMM/barLen);
  const len=totalMM/nPieces;
  return ffdCutBars([{len,qty:nPieces}], barLen);
}
// FFD que retorna os planos de corte detalhados (quais peças em cada barra + sobra)
function ffdPlano(pieces, barLen){
  const expanded=[];
  for(const p of pieces) for(let i=0;i<p.qty;i++) expanded.push(p.len);
  expanded.sort((a,b)=>b-a);
  const bars=[]; // cada barra: {pcs:[len...], rest}
  for(const pc of expanded){
    let placed=false;
    for(const bar of bars){ if(bar.rest>=pc){bar.pcs.push(pc);bar.rest-=pc;placed=true;break;} }
    if(!placed) bars.push({pcs:[pc],rest:barLen-pc});
  }
  return bars;
}

/* ===================== CÁLCULO ===================== */
function compute(){
  const quebra=Math.max(0,num(document.getElementById('quebra').value)||0)/100;
  const barra=Math.max(1,num(document.getElementById('barra').value)||6000);
  const rkgGalv=num((document.getElementById('galvkg')||{}).value)||0; // R$/kg do galvanizado (editável)
  const fator=1+quebra;
  // acumula por perfil (chave inclui laminado + material, p/ não misturar carbono e galvanizado)
  const prof={};
  function add(name,lam,mat,esp,fora){name=cleanProfile(name);if(!name)return null;
    const foraKey=fora?('||FC:'+fora.slitter+'x'+fora.esp+'x'+fora.rkg+(fora.ipi?'i':'')):'';
    const key=name+(lam?('@@'+lam.desc):'')+(mat?('##'+mat):'')+foraKey;
    if(!prof[key]){
      if(fora){
        const fsl=num(fora.slitter)||0, fes=num(fora.esp)||0;
        const kgmFora=(fsl*fes*(PRECOS.densidade||8000))/1e6;
        prof[key]={contMM:0,pieces:[],kgm:kgmFora,kgmSource:'fora',name,lam:null,mat:mat||'',esp:esp||'',fora:fora};
      }else{
        const _lk=kgmLookup(name);
        prof[key]={contMM:0,pieces:[],kgm:(KGM[name]!=null?KGM[name]:_lk.kgm),kgmSource:(KGM[name]!=null?'manual':_lk.source),name,lam:lam||null,mat:mat||'',esp:esp||''};
      }
    }
    return prof[key];}
  for(const f of FICHAS){
    const dup=f.duplas||[];const lam=f.lam||[];const mat=f.mat||[];const esp=f.esp||[];const fora=f.fora||[];
    const mult=i=>(dup[i]?2:1);
    const isTerca=/terç[ao]|terca|tca\b|t\.c\.a\.|terça\s*simples/i.test(f.nome);
    if(isTerca){
      // fallback: se profiles[0] vazio, tenta extrair da 2ª linha da ficha (ex: "UE 150x60x15 #2,65")
      let profTerca=f.profiles[0]||'';
      if(!profTerca){const m=(f.nome+' ').match(/UE?\s*[\d]+/i);if(m)profTerca=m[0];}
      const p=add(profTerca||f.nome,lam[0],mat[0],esp[0],fora[0]);if(p&&f.comp)p.pieces.push({len:f.comp*1000,qty:f.qty*mult(0)});continue;
    }
    // tesoura/pilar: 2 perfis (banzo/interno). Comprimento manual (cm, digitado) sobrescreve o medido.
    const cmArr=f.compManual||[];
    const compBanzo=(cmArr[0]!=null&&cmArr[0]!=='')?(num(cmArr[0])*10):f.banzoMM;
    const compInt=(cmArr[1]!=null&&cmArr[1]!=='')?(num(cmArr[1])*10):f.intMM;
    if(f.profiles.length>=1&&compBanzo){const p=add(f.profiles[0],lam[0],mat[0],esp[0],fora[0]);if(p)p.contMM+=compBanzo*f.qty*mult(0);}
    if(f.profiles.length>=2&&compInt){const p=add(f.profiles[1],lam[1],mat[1],esp[1],fora[1]);if(p)p.contMM+=compInt*f.qty*mult(1);}
    // se 1 perfil só e mediu, joga tudo nele
    if(f.profiles.length===1&&compInt){const p=add(f.profiles[0],lam[0],mat[0],esp[0],fora[0]);if(p)p.contMM+=compInt*f.qty*mult(0);}
  }
  // monta tabela
  let rows='',pesoTotal=0,custoTotal=0;
  const list=Object.values(prof);
  if(!list.length){elResult.innerHTML='<span class="muted">Vincule ao menos uma tesoura/pilar a um grupo do desenho, ou confira as fichas.</span>';}
  else{
    const temPreco=PRECOS.ok&&(Object.keys(PRECOS.rkg).length>0||PRECOS.laminados.length>0);
    rows='<table><thead><tr><th>Perfil</th><th class="n">Barras 6m</th><th class="n">Metros</th><th class="n">kg/m</th><th class="n">Peso</th>'+(temPreco?'<th class="n">Unitário</th><th class="n">Custo</th>':'')+'</tr></thead><tbody>';
    LASTROWS=[];
    list.forEach((p,pi)=>{
      let bars=0,metros=0;
      const lamBarra=p.lam?Math.max(1,p.lam.comp||6000):barra; // comprimento da barra do laminado, se houver
      if(p.contMM){const tot=p.contMM*fator;metros+=tot/1000;
        // Banzo / comprimento contínuo: divisão simples (total ÷ barra, arredonda pra cima).
        // A quebra já está aplicada em 'fator'. Emenda de barras é normal no banzo.
        bars+=Math.ceil(tot/lamBarra);
      }
      if(p.pieces.length){
        const allPcs=[];
        for(const pc of p.pieces){allPcs.push({len:pc.len,qty:pc.qty});metros+=pc.qty*pc.len/1000;}
        bars+=ffdCutBars(allPcs,lamBarra);
      }
      const peso=metros*p.kgm;pesoTotal+=peso;
      let custo=0,unit='',unitTxt='';
      if(p.lam){ // LAMINADO: custo por barra
        custo=bars*p.lam.valor;unit=p.lam.valor;unitTxt='R$ '+p.lam.valor.toLocaleString('pt-BR',{minimumFractionDigits:2})+'/barra';
      }else if(p.fora){ // PERFIL FORA DE CATÁLOGO: R$/kg informado (com IPI opcional)
        const rkgBase=num(p.fora.rkg)||0;
        const rkg=rkgBase*(p.fora.ipi?1.0325:1);
        custo=peso*rkg;unit=rkg;unitTxt=rkg?('R$ '+rkg.toFixed(2)+'/kg'+(p.fora.ipi?' +IPI':'')):'—';
      }else{ // PERFIL U/UE: custo por peso × R$/kg
        let rkg, rkgEspecial=rkgDoBanco(p.name);
        if(rkgEspecial!=null){rkg=rkgEspecial;} // R$/kg próprio do perfil (especial) tem prioridade
        else if(p.mat==='galvanizado'){rkg=rkgGalv;}
        else{rkg=temPreco?rkgPorEsp(espDoPerfil(p.name)):0;}
        custo=peso*rkg;unit=rkg;unitTxt=rkg?('R$ '+rkg.toFixed(2)+'/kg'+(rkgEspecial!=null?' ★':'')):'—';
      }
      custoTotal+=custo;
      const selo=p.lam?(' <span class="pill" style="color:var(--blue)">'+escapeHtml(p.lam.grupo||'laminado')+'</span>'):(p.mat?(' <span class="pill" style="color:var(--steel-2)">'+p.mat+'</span>'):'');
      const nomeMostra=p.name+selo;
      LASTROWS.push({name:p.name,lam:p.lam?p.lam.desc:'',mat:p.mat||'',bars,metros,kgm:p.kgm,peso,unit,unitTxt,custo,fora:p.fora||null});
      rows+='<tr><td>'+nomeMostra+'</td><td class="n">'+bars+'</td><td class="n">'+metros.toFixed(1)+'</td><td class="n">'+(p.lam?'<span class="muted">—</span>':p.fora?('<span class="mono">'+p.kgm.toFixed(3)+'</span> <span title="Calculado pelo slitter" style="font-size:10px;color:var(--blue)">⚙ slitter</span>'):('<input data-kgm="'+pi+'" value="'+p.kgm+'" style="'+(p.kgmSource==='estimado'?'border-color:var(--warn);background:#fffbf0':'border-color:var(--ok);background:#f0fbf5')+'"> <span title="'+(p.kgmSource==='catalogo'?'Valor de catálogo':'Estimado — confira!')+'" style="font-size:10px;color:'+(p.kgmSource==='estimado'?'var(--warn)':'var(--ok)')+'">'+(p.kgmSource==='estimado'?'⚠ est.':'✓ cat.')+'</span>'))+'</td><td class="n">'+(p.lam?'<span class="muted">—</span>':Math.round(peso)+' kg')+'</td>'+
        (temPreco?('<td class="n" style="font-size:11px">'+unitTxt+'</td><td class="n">'+(custo?'R$ '+custo.toLocaleString('pt-BR',{minimumFractionDigits:2}):'—')+'</td>'):'')+'</tr>';
    });
    rows+='</tbody></table><div class="hint">Barras de '+(barra/1000)+' m (perfis) — laminados usam a barra do catálogo. Carbono: peso × R$/kg da '+(PRECOS.fornecedor||'Perfitec')+' (por espessura). Galvanizado: peso × R$ '+rkgGalv.toLocaleString('pt-BR',{minimumFractionDigits:2})+'/kg (editável em Ajustes). Laminados: nº de barras × R$/barra. Cantoneira dupla conta ×2.'+(!temPreco?' <b style="color:var(--warn)">Abra o Orçamento RM uma vez neste navegador para sincronizar os preços.</b>':'')+'</div>';
    elResult.innerHTML=rows;
    elResult.querySelectorAll('input[data-kgm]').forEach(inp=>inp.addEventListener('change',()=>{KGM[list[+inp.dataset.kgm].name]=num(inp.value)||0;compute();save();}));
  }
  LASTPESO=pesoTotal;LASTCUSTO=custoTotal;
  document.getElementById('pesoTotal').textContent=Math.round(pesoTotal).toLocaleString('pt-BR')+' kg';
  computeTelha();
  atualizaTotalGeral();
}

        linhas+='<div class="tr-line tr-sub"><span>× R$ '+rm2.toFixed(2).replace('.',',')+'/m²</span><b></b></div>';
      }
      if(custo){
        linhas+='<div class="tr-total"><span>Custo da telha</span><b>R$ '+custo.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})+'</b></div>';

  atualizaTotalGeral();
}

async function handleCad(file){
  try{
    // Lê como latin1 (Windows-1252) para preservar caracteres como Ç (0xC7) gerados pelo AutoCAD
    const buf=await file.arrayBuffer();
    const txt=new TextDecoder('windows-1252').decode(buf);
    const res=importarCAD(txt);
    if(!res.fichas.length){
      log('✗ nenhuma ficha válida no arquivo. Confira se o texto tem TESOURA/PILAR e perfis.','err');
      return;
    }
    SEG=[];TXT=[];FICHAS=res.fichas;
    document.getElementById('app').classList.remove('hide');
    document.querySelector('.entradas').classList.add('hide');
    const fb=document.getElementById('fbName');if(fb)fb.textContent=file.name+' · '+res.fichas.length+' estrutura(s) do CAD';
    renderAll();
    log('✓ '+res.fichas.length+' estrutura(s) importada(s) do CAD'+(res.ignoradas?(' · '+res.ignoradas+' linha(s) ignorada(s)'):''),'ok');
  }catch(e){log('✗ erro ao ler arquivo: '+(e.message||e),'err');}
}

function gerarRelatorioCorte(){
  const barra=Math.max(1,num(document.getElementById('barra').value)||6000);
  const FOLGA=12; // 6mm em cada ponta = 12mm a menos por peça interna
  const grupos={};
  for(const f of FICHAS){
    // peças internas: prioridade aos grupos do CAD (intGrupos), senão usa intLens (medição antiga)
    let pecas=null;
    if(f.intGrupos&&f.intGrupos.length){
      pecas=f.intGrupos.map(g=>({len:g.len,qty:g.qty}));
    }else if(f.intLens&&f.intLens.length){
      const cont={};for(const L of f.intLens){const c=Math.round(L);cont[c]=(cont[c]||0)+1;}
      pecas=Object.entries(cont).map(([len,qty])=>({len:+len,qty}));
    }
    if(!pecas||!pecas.length)continue;
    const perfilInt=f.profiles.length>=2?f.profiles[1]:(f.profiles[0]||f.nome);
    if(!grupos[perfilInt])grupos[perfilInt]={pieces:{},qtdEstrut:0,exemplo:f.nome};
    const g=grupos[perfilInt];
    g.qtdEstrut+=f.qty;
    // cada peça (× qtd de estruturas), descontando a folga
    for(const pc of pecas){
      const corte=Math.max(1,Math.round(pc.len-FOLGA));
      g.pieces[corte]=(g.pieces[corte]||0)+pc.qty*f.qty;
    }
  }
  const nomes=Object.keys(grupos);
  if(!nomes.length){
    alert('Nenhuma peça interna disponível para o relatório.\n\nUse o plugin RMEXPORTA (versão nova) para exportar as diagonais agrupadas, ou meça as estruturas, e então gere o relatório de corte.');
    return;
  }
  const obra=document.getElementById('obra').value||'';
  const dataBr=new Date().toLocaleDateString('pt-BR');
  let totalBarrasGeral=0,secoes='';
  for(const nome of nomes){
    const g=grupos[nome];
    const piecesArr=Object.entries(g.pieces).map(([len,qty])=>({len:+len,qty})).sort((a,b)=>b.len-a.len);
    const bars=ffdPlano(piecesArr.map(p=>({len:p.len,qty:p.qty})), barra);
    const nBarras=bars.length;totalBarrasGeral+=nBarras;
    const totalPecas=piecesArr.reduce((s,p)=>s+p.qty,0);
    const usado=bars.reduce((s,b)=>s+(barra-b.rest),0);
    const sobra=bars.reduce((s,b)=>s+b.rest,0);
    const aproveit=nBarras?usado/(nBarras*barra)*100:0;
    let tbPecas='';
    for(const p of piecesArr) tbPecas+='<tr><td>'+(p.len/1000).toFixed(3).replace('.',',')+' m</td><td class="n">'+p.qty+'</td></tr>';
    let planos='';
    bars.forEach((b,i)=>{
      const cortes={};b.pcs.forEach(l=>cortes[l]=(cortes[l]||0)+1);
      const desc=Object.entries(cortes).sort((a,b)=>b[0]-a[0]).map(([l,q])=>q+'× '+(l/1000).toFixed(3).replace('.',',')+'m').join('  +  ');
      planos+='<tr><td class="n">'+(i+1)+'</td><td>'+desc+'</td><td class="n">sobra '+(b.rest/1000).toFixed(3).replace('.',',')+' m</td></tr>';
    });
    secoes+='<div class="grp">'+
      '<div class="grp-h"><b>'+escapeHtml(nome)+'</b><span>'+g.qtdEstrut+' estrutura(s) · '+totalPecas+' peças internas</span></div>'+
      '<div class="cols">'+
        '<div class="col"><div class="ct">Peças a cortar (já c/ folga de 6mm por ponta)</div>'+
          '<table class="rt"><thead><tr><th>Comprimento</th><th class="n">Qtd</th></tr></thead><tbody>'+tbPecas+'</tbody></table></div>'+
        '<div class="col"><div class="ct">Plano de corte · barras de '+(barra/1000).toFixed(2).replace('.',',')+' m</div>'+
          '<table class="rt"><thead><tr><th class="n">Barra</th><th>Cortes</th><th class="n">Sobra</th></tr></thead><tbody>'+planos+'</tbody></table></div>'+
      '</div>'+
      '<div class="grp-f"><span>Barras necessárias: <b>'+nBarras+'</b></span><span>Aproveitamento: <b>'+aproveit.toFixed(1)+'%</b></span><span>Sobra total: <b>'+(sobra/1000).toFixed(2).replace('.',',')+' m</b></span></div>'+
    '</div>';
  }
  const logo=(typeof LOGO_RM!=='undefined'&&LOGO_RM)?'<img src="'+LOGO_RM+'" style="height:54px">':'<b style="font-size:20px;color:#aa221f">RM</b>';
  const html='<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8"><title>Relatório de corte — '+escapeHtml(obra||'RM')+'</title>'+
    '<style>'+
    'body{font-family:Archivo,system-ui,sans-serif;color:#1d2127;background:#eef0f2;margin:0;padding:20px}'+
    '.sheet{max-width:900px;margin:0 auto;background:#fff;border:1px solid #dadee3;border-radius:12px;overflow:hidden}'+
    '.head{display:flex;justify-content:space-between;align-items:flex-start;padding:20px 24px 16px;border-bottom:3px solid;border-image:linear-gradient(90deg,#aa221f 0 33%,#585758 33% 66%,#aa221f 66%) 1}'+
    '.head .co{text-align:right;font-size:12px;color:#6c7480;line-height:1.5}.head .co .nm{font-size:14px;font-weight:700;color:#1d2127}'+
    '.head .co .tag{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#aa221f;font-weight:700;margin-top:5px}'+

function normNome(s){return (s||'').toUpperCase().replace(/[^A-Z0-9]/g,'');}
// Importa arquivo do CAD V2: monta as fichas direto (texto+perfis+qtd+medidas), sem DWG.
function importarCAD(txt){
  // Normaliza quebras de linha: o plugin AutoCAD às vezes exporta o nome da estrutura
  // em uma linha sem "|" e os perfis+dados na linha seguinte com "|".
  // Ex: "\pxsm1.5,t4;TRELIÇA 2" + "U 40x75x40 #2,00 / ... / Qtd: 24|2257.1|0"
  // Quando a linha COM "|" segue uma linha SEM "|", juntamos as duas.
  const rawLinhas=txt.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
  const linhas=[];
  for(const l of rawLinhas){
    if(/^RM_CORTE_MEDICOES/i.test(l)||l.startsWith('#')){linhas.push(l);continue;}
    const temPipe=l.includes('|');
    if(temPipe&&linhas.length){
      const prev=linhas[linhas.length-1];
      // linha anterior sem "|" e não é cabeçalho = nome da ficha pendente; junta
      if(prev&&!prev.includes('|')&&!prev.startsWith('#')&&!/^RM_CORTE_MEDICOES/i.test(prev)){
        linhas[linhas.length-1]=prev+' / '+l;continue;
      }
    }
    linhas.push(l);
  }
  const novas=[];let ignoradas=0;
  for(const l of linhas){
    if(/^RM_CORTE_MEDICOES/i.test(l)||l.startsWith('#'))continue;
    const parts=l.split('|');
    if(parts.length<3)continue;
    const textoFicha=parts[0].trim();
    const banzoCm=num(parts[1])||0;
    const intCm=num(parts[2])||0;
    // parseia o texto da ficha (mesma lógica do DWG): nome, perfis, quantidade
    const f=parseUmTexto(textoFicha);
    if(!f){ignoradas++;continue;}
    const isTercaImport=/ter\u00e7[ao]|terca|tca\b|t\.c\.a\.|ter\u00e7a\s*simples/i.test(f.nome);
    // Para TERÇA: banzoCm (col 2) = comprimento da peça em cm → converte para metros e salva em comp.
    // Para TESOURA/PILAR: banzo = 1º perfil, interno = 2º perfil. Medidas vão em compManual (cm).
    let compFinal=f.comp;
    const compManual=[];
    if(isTercaImport){
      if(!compFinal&&banzoCm>0)compFinal=banzoCm/100; // cm → m
    }else{
      if(banzoCm>0)compManual[0]=(''+banzoCm).replace('.',',');
      if(intCm>0)compManual[1]=(''+intCm).replace('.',',');
    }
    // V3: colunas 4 e 5 = grupos de peças "qtdxTAM;qtdxTAM" (cm). Usados no relatório de corte.
    const banzoGrupos=parts.length>=4?parseGrupos(parts[3]):[];
    const intGrupos=parts.length>=5?parseGrupos(parts[4]):[];
    novas.push({
      nome:f.nome, profiles:f.profiles, duplas:f.duplas, cants:f.cants,
      lam:[], mat:[], esp:[], qty:f.qty, comp:compFinal,
      cluster:-1, banzoMM:0, intMM:0, compManual, banzoGrupos, intGrupos, tx:{x:0,y:0}
    });
  }
  return {fichas:novas, ignoradas};
}
// parseia "8x150,5;4x90,2" → [{len_mm, qty}] (tam vem em cm, converte p/ mm)
function parseGrupos(s){
  if(!s||!s.trim())return [];
  const out=[];
  for(const par of s.split(';')){
    const m=par.trim().match(/(\d+)\s*x\s*([\d.,]+)/i);
    if(m){const qty=+m[1];const cm=num(m[2])||0;if(qty>0&&cm>0)out.push({len:Math.round(cm*10),qty});}
  }
  return out;
}
function importarMedicoes(txt){
  const linhas=txt.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
  // formato V1: "RM_CORTE_MEDICOES_V1" + linhas "nome|banzo_cm|interno_cm"
  const meds=[];
  for(const l of linhas){
    if(/^RM_CORTE_MEDICOES/i.test(l)||l.startsWith('#'))continue;
    const parts=l.split('|');
    if(parts.length>=2){
      meds.push({nome:parts[0].trim(), banzo:num(parts[1])||0, interno:parts.length>=3?(num(parts[2])||0):0});
    }
  }
  let casadas=0;const naoCasadas=[];const usadas=new Set();
  for(const m of meds){
    const alvo=normNome(m.nome);
    // procura ficha com nome igual (ainda não usada nesta importação)
    let fi=FICHAS.findIndex((f,i)=>!usadas.has(i)&&normNome(f.nome)===alvo);
    // se não achou exato, tenta por "começa com" (TESOURA casa TESOURA 2)
    if(fi<0)fi=FICHAS.findIndex((f,i)=>!usadas.has(i)&&(normNome(f.nome).startsWith(alvo)||alvo.startsWith(normNome(f.nome))));
    if(fi>=0){
      const f=FICHAS[fi];usadas.add(fi);
      if(!f.compManual)f.compManual=[];
      // banzo = perfil 0, interno = perfil 1
      if(m.banzo>0)f.compManual[0]=(''+m.banzo).replace('.',',');
      if(m.interno>0)f.compManual[1]=(''+m.interno).replace('.',',');
      casadas++;
    }else{
      naoCasadas.push(m.nome+' (banzo '+m.banzo+'cm, interno '+m.interno+'cm)');
    }
  }
  return {casadas,naoCasadas};
}

    desc: '0',
    linhasPerfil: [],
    linhasTelha: [],
    linhasCat: [],
    linhasAvulso: linhasAvulso
  };

  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const slug=(obra||'corte').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')||'corte';
  a.href=url;a.download='orcamento-rm_'+slug+'_'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),2000);

<!-- Ajuste de tela (mobile) -->
<script>
(function(){
  // Sistemas embutidos como aba dentro de outro (ex: dentro do central_rm)
  // não ganham botão próprio: a página que os contém já ajusta a tela
  // inteira, incluindo o conteúdo embutido. Ter os dois brigando pelo
  // mesmo transform só causa confusão e comportamento duplicado.
  if (window.top !== window.self) return;

  var KEY = 'rmFitScreen';
  var btn, fitEnabled = false;

  // Transforma o <body> diretamente (sem envolver o conteúdo numa nova div):
  // muitos sistemas usam "body{display:flex;height:100vh}" pra organizar
  // sidebar + área de conteúdo lado a lado, e envolver os filhos numa div
  // extra quebraria esse layout (a área de conteúdo perde a altura e fica
  // em branco). O botão fica fora do <body> (direto em <html>) pra nunca
  // ser afetado pela escala nem herdar o novo containing block que o
  // transform cria para descendentes com position:fixed.
  function naturalWidth(){
    var t = document.body.style.transform;
    document.body.style.transform = 'none';
    var w = document.body.scrollWidth;
    document.body.style.transform = t;
    return w;
  }

  function viewportWidth(){
    if (window.visualViewport && window.visualViewport.width) return window.visualViewport.width;
    if (window.screen && window.screen.width) return window.screen.width;
    return window.innerWidth;
  }

  function isOn(){
    return fitEnabled;
  }

  function setFit(on){
    fitEnabled = on;
    if (on) {
      document.body.style.transformOrigin = 'top left';
      var w = naturalWidth();
      var scale = Math.min(1, viewportWidth() / w);
      // scale(1) não é o mesmo que "sem transform": mesmo sem mudar nada
      // visualmente, qualquer transform diferente de none cria um novo
      // contexto de posicionamento para elementos fixed/sticky dentro do
      // body, podendo bagunçar cabeçalhos e barras fixas à toa quando o
      // conteúdo já cabe na tela.
      document.body.style.transform = scale >= 0.999 ? 'none' : 'scale(' + scale + ')';
    } else {
      document.body.style.transform = 'none';
    }
    document.documentElement.style.overflowX = on ? 'hidden' : '';
    btn.classList.toggle('rmFitOn', on);
    btn.title = on ? 'Restaurar tela cheia (desktop)' : 'Ajustar à tela do celular';
    try { localStorage.setItem(KEY, on ? '1' : '0'); } catch(e){}
  }

  function build(){
    btn = document.createElement('button');
    btn.id = 'rmFitBtn';
    btn.type = 'button';
    btn.innerHTML = '&#9974;';
    btn.title = 'Ajustar à tela do celular';
    document.documentElement.appendChild(btn);

    var css = document.createElement('style');
    css.textContent =
      '#rmFitBtn{position:fixed;right:14px;bottom:14px;width:42px;height:42px;border-radius:50%;'+
      'background:#16171b;color:#f0f0f0;border:1px solid rgba(255,255,255,.18);font-size:19px;'+
      'line-height:1;z-index:2147483647;cursor:pointer;box-shadow:0 3px 12px rgba(0,0,0,.4);'+
      'display:flex;align-items:center;justify-content:center;opacity:.5;transition:opacity .2s,transform .15s;'+
      '-webkit-tap-highlight-color:transparent;padding:0}'+
      '#rmFitBtn:active{transform:scale(.92)}'+
      '#rmFitBtn.rmFitOn{opacity:.95;background:#8c1d18;border-color:#8c1d18}'+
      '@media(hover:hover){#rmFitBtn:hover{opacity:.95}}';
    document.head.appendChild(css);

    btn.addEventListener('click', function(){
      setFit(!isOn());
    });

    // Em páginas largas (pensadas pra PC), o viewport de layout do celular se
    // expande para acompanhar o conteúdo — então "position:fixed" com
    // right/bottom fica ancorado fora da área visível. Reposiciona o botão
    // usando o visualViewport real (tela física) em vez do layout viewport.
    function positionBtn(){
      var vv = window.visualViewport;
      if (!vv) return;
      var size = 42, margin = 14;
      btn.style.right = 'auto';
      btn.style.bottom = 'auto';
      btn.style.left = Math.round(vv.offsetLeft + vv.width - size - margin) + 'px';
      btn.style.top = Math.round(vv.offsetTop + vv.height - size - margin) + 'px';
    }

    var resizeTimer;
    function onResize(){
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(function(){
        positionBtn();
        if (isOn()) setFit(true);
      }, 150);
    }
    window.addEventListener('resize', onResize);
    window.addEventListener('scroll', positionBtn, { passive: true });
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', onResize);
      window.visualViewport.addEventListener('scroll', positionBtn);
    }
    positionBtn();

    var saved;
    try { saved = localStorage.getItem(KEY); } catch(e){}
    if (saved === '1') setFit(true);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', build);
  } else {
    build();
  }
})();
</script>
</body>
</html>
