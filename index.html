<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Corte de Estruturas — RM</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#15181b;--panel:#1b1f23;--panel2:#20262b;--line:#272c31;--txt:#e8e6e3;--muted:#8b9199;--red:#aa221f;--ok:#2dd4bf;--warn:#fbbf24;--sup:#ff5a3c;--web:#fbbf24;--blue:#7fdbff}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);font-family:'Archivo',system-ui,sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased;padding-bottom:80px}
  .appbar{background:#0f1113;border-bottom:2px solid var(--red);padding:13px 16px;display:flex;align-items:center;gap:11px;position:sticky;top:0;z-index:20}
  .appbar .dot{width:12px;height:12px;background:var(--red);border-radius:2px;transform:rotate(45deg)}
  .appbar h1{font-size:14px;font-weight:800;letter-spacing:.2px}
  .appbar .tag{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
  .wrap{max-width:1000px;margin:0 auto;padding:16px}
  .drop{border:2px dashed var(--line);border-radius:13px;padding:22px 16px;text-align:center;background:var(--panel);cursor:pointer}
  .drop.hot{border-color:var(--red);background:var(--panel2)}
  .drop b{display:block;font-size:15px;margin-bottom:3px}
  .drop span{font-size:12px;color:var(--muted)}
  .drop input{display:none}
  .log{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);margin-top:10px;white-space:pre-wrap;word-break:break-word;line-height:1.6}
  .log .ok{color:var(--ok)}.log .err{color:var(--sup)}.log .warn{color:var(--warn)}
  h2.sec{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin:22px 2px 10px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:13px;margin-bottom:12px;overflow:hidden}
  .card .hd{padding:11px 13px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--line)}
  .card .hd .bar{width:4px;height:18px;border-radius:2px}
  .card .hd h3{font-size:13px;font-weight:700}
  .card .hd .q{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted)}
  .card .bd{padding:11px 13px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .fld label{display:block;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
  .fld input,.fld select{width:100%;background:#0f1113;border:1px solid var(--line);border-radius:8px;color:var(--txt);font-family:'JetBrains Mono',monospace;font-size:14px;padding:7px 9px}
  .fld input:focus,.fld select:focus{outline:none;border-color:var(--red)}
  .settings{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  @media(max-width:620px){.settings{grid-template-columns:repeat(2,1fr)}}
  .stage{background:#0d0f11;border:1px solid var(--line);border-radius:12px;overflow:hidden;position:relative;touch-action:none}
  .stage svg{width:100%;height:auto;display:block}
  .zoom{position:absolute;top:8px;right:8px;display:flex;gap:6px}
  .zoom button{width:34px;height:34px;border:1px solid var(--line);background:#0f1113cc;color:var(--txt);border-radius:8px;font-size:18px;font-family:'JetBrains Mono',monospace}
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}
  .chip{display:flex;align-items:center;gap:7px;background:var(--panel2);border:1px solid var(--line);border-radius:999px;padding:5px 10px;font-size:12px;cursor:pointer}
  .chip.sel{border-color:var(--red);background:#2a1c1c}
  .chip .dt{width:9px;height:9px;border-radius:50%}
  .chip select{background:transparent;border:none;color:var(--txt);font-size:12px;font-family:'Archivo'}
  table{width:100%;border-collapse:collapse;font-size:12px}
  th,td{text-align:left;padding:7px 6px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.4px}
  td{font-family:'JetBrains Mono',monospace}
  td.n,th.n{text-align:right}
  td input{width:74px;background:#0f1113;border:1px solid var(--line);border-radius:6px;color:var(--txt);font-family:'JetBrains Mono',monospace;font-size:12px;padding:4px 6px;text-align:right}
  .btn{display:inline-flex;align-items:center;gap:6px;background:var(--red);color:#fff;border:none;border-radius:9px;padding:9px 14px;font-size:13px;font-weight:600;font-family:'Archivo';cursor:pointer}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--txt)}
  .pill{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:11px;background:#0f1113;border:1px solid var(--line);border-radius:6px;padding:2px 7px;color:var(--muted)}
  .total{background:linear-gradient(180deg,var(--panel),var(--bg));border:1px solid var(--red);border-radius:13px;padding:15px;margin-top:6px;display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
  .total .big{font-family:'JetBrains Mono',monospace;font-size:30px;font-weight:700;color:var(--sup)}
  .total .m{font-size:12px;color:var(--muted)}
  .hide{display:none}
  .muted{color:var(--muted)}
  .hint{font-size:11px;color:var(--muted);margin-top:8px;line-height:1.5}
</style>
</head>
<body>
  <div class="appbar"><span class="dot"></span><h1>Corte de Estruturas</h1><span class="tag" id="ver">RM · v1</span></div>
  <div class="wrap">

    <label class="drop" id="drop"><b>Abrir DWG</b><span>toque ou arraste · roda no seu navegador</span><input type="file" id="file" accept=".dwg,.dxf"></label>
    <div class="log" id="log"></div>

    <div id="app" class="hide">
      <!-- AJUSTES -->
      <h2 class="sec">Ajustes</h2>
      <div class="settings">
        <div class="fld"><label>Unidade do DWG</label><select id="unit"><option value="10">cm → mm</option><option value="1">mm</option><option value="1000">m → mm</option></select></div>
        <div class="fld"><label>Quebra %</label><input id="quebra" type="number" value="10" inputmode="numeric"></div>
        <div class="fld"><label>Barra (mm)</label><input id="barra" type="number" value="6000" step="100" inputmode="numeric"></div>
        <div class="fld"><label>Telha R$/m²</label><input id="telhaval" type="number" value="0" step="0.01" inputmode="decimal"></div>
      </div>

      <!-- FICHAS -->
      <h2 class="sec">Fichas lidas do desenho</h2>
      <div id="fichas"></div>

      <!-- MEDIÇÃO -->
      <h2 class="sec">Medição — toque num grupo do desenho e diga o que é</h2>
      <div class="stage" id="stage">
        <svg id="svg"></svg>
        <div class="zoom"><button id="zin">+</button><button id="zout">−</button></div>
      </div>
      <div class="chips" id="chips"></div>
      <div class="hint" id="mhint"></div>

      <!-- RESULTADO -->
      <h2 class="sec">Lista de compra</h2>
      <div class="card"><div class="bd" id="result"></div></div>
      <div class="total"><span class="big" id="pesoTotal">0 kg</span><span class="m">peso total de aço · <span id="telhaTotal"></span></span></div>
      <div style="margin-top:12px;display:flex;gap:8px"><button class="btn" id="copy">Copiar lista</button></div>
    </div>
  </div>

<script type="module">
/* ===================== CARREGAMENTO (provado) ===================== */
const logEl=document.getElementById('log');
function log(m,c){const s=document.createElement('span');if(c)s.className=c;s.textContent=m+'\n';logEl.appendChild(s);}
const BASE='https://cdn.jsdelivr.net/npm/@mlightcad/libredwg-web';
let LibreDwg,Dwg_File_Type,lib=null,wasmBinary=null,wasmUrl=null;
log('carregando módulo…');
for(const u of [BASE+'/wasm/libredwg-web.wasm',BASE+'/wasm/libredwg.wasm']){try{const r=await fetch(u);if(r.ok){wasmBinary=await r.arrayBuffer();wasmUrl=u;log('✓ wasm '+Math.round(wasmBinary.byteLength/1024)+' KB','ok');break;}}catch(e){}}
try{const m=await import(BASE+'/+esm');LibreDwg=m.LibreDwg;Dwg_File_Type=m.Dwg_File_Type;}catch(e){log('✗ wrapper: '+e.message,'err');}
async function init(){
  const tries=[
    ['create(dir)',async()=>LibreDwg&&await LibreDwg.create(BASE+'/wasm/')],
    ['create(opts)',async()=>LibreDwg&&await LibreDwg.create({wasmBinary,locateFile:()=>wasmUrl})],
    ['raw+ctor',async()=>{const g=await import(BASE+'/wasm/libredwg-web.js');const cm=g.createModule||g.default||g;const mod=await cm({wasmBinary,locateFile:()=>wasmUrl});if(LibreDwg){try{return new LibreDwg(mod);}catch(_){}}return mod;}]
  ];
  for(const [n,fn] of tries){try{const c=await fn();if(c&&(typeof c.convert==='function'||typeof c.dwg_read_data==='function')){log('✓ pronto ('+n+')','ok');return c;}}catch(e){}}
  return null;
}
lib=await init();
if(!lib)log('✗ não inicializou a biblioteca','err');

/* ===================== EXTRAÇÃO ===================== */
const P=p=>p?({x:p.x??p[0]??0,y:p.y??p[1]??0}):null;
const dist=(a,b)=>Math.hypot(b.x-a.x,b.y-a.y);
function collectEntities(db){if(Array.isArray(db))return db;for(const k of['entities','modelSpaceEntities','modelSpace'])if(Array.isArray(db?.[k]))return db[k];for(const k in db){const v=db[k];if(Array.isArray(v)&&v.length&&typeof v[0]==='object'&&'type'in v[0])return v;}return[];}
function segsOf(e){const t=(e.type||'').toUpperCase();
  if(t==='LINE'){const a=P(e.startPoint||e.start||e.vertices?.[0]),b=P(e.endPoint||e.end||e.vertices?.[1]);return a&&b?[[a,b]]:[];}
  if(t==='LWPOLYLINE'||t==='POLYLINE'){const v=(e.vertices||e.points||[]).map(P).filter(Boolean);const s=[];for(let i=0;i<v.length-1;i++)s.push([v[i],v[i+1]]);if((e.closed||e.isClosed)&&v.length>2)s.push([v[v.length-1],v[0]]);return s;}
  return[];}
function textOf(e){const t=(e.type||'').toUpperCase();if(t==='TEXT'||t==='MTEXT'||t==='ATTRIB')return e.text??e.textValue??e.contents??e.string??null;return null;}

let SEG=[],TXT=[],CL=[],FICHAS=[],unitF=10;
const KGM={}; // overrides de kg/m por perfil

function readDwg(buf){
  const ft=Dwg_File_Type?.DWG;
  let dwg;try{dwg=lib.dwg_read_data(buf,ft);}catch(_){dwg=lib.dwg_read_data(buf.buffer,ft);}
  const db=typeof lib.convert==='function'?lib.convert(dwg):dwg;
  try{lib.dwg_free&&lib.dwg_free(dwg);}catch(_){}
  const ents=collectEntities(db);
  SEG=[];TXT=[];
  for(const e of ents){
    const lay=(e.layer??'?')+'';
    for(const [a,b] of segsOf(e)) if(dist(a,b)>0) SEG.push({a,b,layer:lay,cl:-1,cat:0});
    const tx=textOf(e);if(tx!=null&&(''+tx).trim())TXT.push((''+tx).trim());
  }
  log('✓ '+ents.length+' entidades · '+SEG.length+' segmentos · '+TXT.length+' textos','ok');
}

/* ===================== FICHAS (texto) ===================== */
function num(s){return parseFloat((s+'').replace(',','.'));}
function cleanProfile(s){return s.replace(/\s+/g,'').replace(/[#]/g,'').replace(/\(.*?\)/g,'').trim();}
function kgmEstimate(prof){
  const nums=(prof.match(/\d+(?:[.,]\d+)?/g)||[]).map(num);
  if(nums.length<2)return 0;
  const thick=nums.find(n=>!Number.isInteger(n))??nums[nums.length-1];
  const dims=nums.filter(n=>n!==thick);
  let dev=0;
  if(dims.length>=3)dev=dims[0]+2*dims[1]+2*dims[2];
  else if(dims.length===2)dev=dims[0]+2*dims[1];
  else dev=dims[0];
  return +(dev*thick*0.00785).toFixed(2); // kg/m (mm,mm)
}
function parseFichas(){
  FICHAS=[];
  for(const raw of TXT){
    const lines=raw.split(/\\P/).map(l=>l.replace(/\\[A-Za-z][^;]*;/g,'').replace(/[{}]/g,'').trim()).filter(Boolean);
    if(!lines.length)continue;
    const nome=lines[0].toUpperCase();
    const profiles=[];let qty=1,comp=null;
    for(let i=1;i<lines.length;i++){
      const l=lines[i];
      if(/quantidade/i.test(l)){const m=l.match(/(\d+)/);if(m)qty=+m[1];}
      else if(/x/i.test(l)&&/\d/.test(l)){profiles.push(cleanProfile(l));}
      const cm=l.match(/\(([\d.,]+)\s*m\)/i)||raw.match(/\(([\d.,]+)\s*m\)/i);if(cm)comp=num(cm[1]);
    }
    if(profiles.length||/tesoura|terça|terca|pilar|trelica|treliça|calha|contravent/i.test(nome))
      FICHAS.push({nome,profiles,qty,comp,cluster:-1,banzoMM:0,intMM:0});
  }
}

/* ===================== CLUSTER (conexão por nós) ===================== */
function bbox(idxs){let mnx=Infinity,mny=Infinity,mxx=-Infinity,mxy=-Infinity;for(const i of idxs){for(const p of[SEG[i].a,SEG[i].b]){mnx=Math.min(mnx,p.x);mny=Math.min(mny,p.y);mxx=Math.max(mxx,p.x);mxy=Math.max(mxy,p.y);}}return{mnx,mny,mxx,mxy,w:mxx-mnx,h:mxy-mny};}
function cluster(){
  const n=SEG.length;const parent=[...Array(n).keys()];
  const find=x=>{while(parent[x]!==x){parent[x]=parent[parent[x]];x=parent[x];}return x;};
  const uni=(a,b)=>{parent[find(a)]=find(b);};
  const all=bbox([...Array(n).keys()]);const tol=Math.max(all.w,all.h)*0.004+0.5;
  const key=p=>Math.round(p.x/tol)+'_'+Math.round(p.y/tol);
  const map=new Map();
  SEG.forEach((s,i)=>{for(const p of[s.a,s.b]){const k=key(p);if(map.has(k))uni(i,map.get(k));else map.set(k,i);}});
  const groups=new Map();
  for(let i=0;i<n;i++){const r=find(i);if(!groups.has(r))groups.set(r,[]);groups.get(r).push(i);SEG[i].cl=r;}
  CL=[];let idx=0;const remap=new Map();
  for(const [r,idxs] of groups){
    const bb=bbox(idxs);let len=0;const lc={};
    for(const i of idxs){len+=dist(SEG[i].a,SEG[i].b);lc[SEG[i].layer]=(lc[SEG[i].layer]||0)+1;}
    const layer=Object.entries(lc).sort((a,b)=>b[1]-a[1])[0][0];
    const aspect=Math.max(bb.w,bb.h)/(Math.min(bb.w,bb.h)||1);
    let role='ignorar';
    if(/pilar/i.test(layer))role='pilar';
    else if(idxs.length<=8&&aspect<4&&bb.w>0&&bb.h>0)role='telha';
    else if(aspect>=4)role='tesoura';
    CL.push({r,idxs,bb,len,layer,aspect,role,id:idx});
    remap.set(r,idx);idx++;
  }
  for(const s of SEG)s.cl=remap.get(s.cl);
  CL.sort((a,b)=>b.len-a.len);
  CL.forEach((c,i)=>{c.id=i;});
  // reindex seg.cl
  const byR=new Map();CL.forEach(c=>byR.set(c.r,c.id));
  for(const s of SEG){/* s.cl já é o id antigo; recompute */}
  // rebuild seg.cl from idxs
  CL.forEach(c=>c.idxs.forEach(i=>SEG[i].cl=c.id));
  autoLinkFichas();
}
function autoLinkFichas(){
  // liga cada ficha medível ao maior cluster do papel correspondente ainda livre
  const used=new Set();
  for(const f of FICHAS){
    let role=null;
    if(/tesoura|trelica|treliça/i.test(f.nome))role='tesoura';
    else if(/pilar/i.test(f.nome))role='pilar';
    if(!role)continue;
    const cand=CL.filter(c=>c.role===role&&!used.has(c.id)).sort((a,b)=>b.len-a.len)[0];
    if(cand){f.cluster=cand.id;used.add(cand.id);splitBanzo(f);}
  }
}

/* ===================== SPLIT BANZO×INTERNO (ângulo) ===================== */
function splitBanzo(f){
  const c=CL[f.cluster];if(!c){f.banzoMM=0;f.intMM=0;return;}
  const horizontal=c.bb.w>=c.bb.h; // eixo longo
  let banzo=0,intr=0;
  for(const i of c.idxs){
    const s=SEG[i];const ang=Math.abs(Math.atan2(s.b.y-s.a.y,s.b.x-s.a.x)*180/Math.PI);
    const a=Math.min(ang,180-ang); // 0=horizontal,90=vertical
    const flat = horizontal ? (a<=22) : (a>=68);
    s.cat = flat?1:2; // 1=banzo,2=interno
    const L=dist(s.a,s.b)*unitF;
    if(flat)banzo+=L;else intr+=L;
  }
  f.banzoMM=banzo;f.intMM=intr;
}
function invert(f){const c=CL[f.cluster];if(!c)return;let b=0,it=0;for(const i of c.idxs){const s=SEG[i];s.cat=s.cat===1?2:1;const L=dist(s.a,s.b)*unitF;if(s.cat===1)b+=L;else it+=L;}f.banzoMM=b;f.intMM=it;}

/* ===================== RENDER DESENHO ===================== */
let VB=null;
const svg=document.getElementById('svg');
function fitVB(){const bb=bbox([...Array(SEG.length).keys()]);const pad=Math.max(bb.w,bb.h)*0.04;VB={x:bb.mnx-pad,y:bb.mny-pad,w:bb.w+2*pad,h:bb.h+2*pad};}
function draw(){
  if(!SEG.length)return;
  const W=960,H=Math.max(180,Math.min(560,W*VB.h/VB.w));
  const sx=x=>(x-VB.x)/VB.w*W, sy=y=>H-(y-VB.y)/VB.h*H;
  let s='';
  for(let i=0;i<SEG.length;i++){
    const g=SEG[i];const sel=selCluster===g.cl;
    let col='#3a4047';
    const fich=FICHAS.find(f=>f.cluster===g.cl);
    if(fich){col=g.cat===1?'var(--sup)':g.cat===2?'var(--web)':'#5a626b';}
    else if(CL[g.cl]){const r=CL[g.cl].role;col=r==='telha'?'var(--blue)':r==='pilar'?'#9b8cff':r==='ignorar'?'#33383d':'#6b7681';}
    if(sel)col='#ffffff';
    s+='<line x1="'+sx(g.a.x).toFixed(1)+'" y1="'+sy(g.a.y).toFixed(1)+'" x2="'+sx(g.b.x).toFixed(1)+'" y2="'+sy(g.b.y).toFixed(1)+'" stroke="'+col+'" stroke-width="'+(sel?1.6:1)+'"/>';
  }
  // caixas clicáveis por cluster
  for(const c of CL){const x=sx(c.bb.mnx),y=sy(c.bb.mxy),w=(c.bb.w/VB.w*W),h=(c.bb.h/VB.h*H);
    s+='<rect data-cl="'+c.id+'" x="'+(x-4).toFixed(1)+'" y="'+(y-4).toFixed(1)+'" width="'+(w+8).toFixed(1)+'" height="'+(h+8).toFixed(1)+'" fill="transparent" stroke="'+(selCluster===c.id?'#ffffff55':'transparent')+'" stroke-dasharray="4 3"/>';}
  svg.setAttribute('viewBox','0 0 '+W+' '+H.toFixed(0));
  svg.innerHTML=s;
  svg.querySelectorAll('rect[data-cl]').forEach(r=>r.addEventListener('click',()=>{selCluster=+r.getAttribute('data-cl');renderAll();}));
}
let selCluster=-1;

/* ===================== RENDER UI ===================== */
const elFichas=document.getElementById('fichas'),elChips=document.getElementById('chips'),elResult=document.getElementById('result');
function roleColor(r){return r==='tesoura'?'var(--sup)':r==='pilar'?'#9b8cff':r==='telha'?'var(--blue)':'#5a626b';}

function renderFichas(){
  elFichas.innerHTML='';
  FICHAS.forEach((f,fi)=>{
    const isTerca=/terça|terca/i.test(f.nome);
    const c=document.createElement('div');c.className='card';
    let prof='';f.profiles.forEach((p,pi)=>{const lbl=f.profiles.length===2?(pi===0?'Banzo':'Interno'):(isTerca?'Perfil':'Perfil '+(pi+1));
      prof+='<div class="fld"><label>'+lbl+'</label><input data-f="'+fi+'" data-p="'+pi+'" value="'+p+'"></div>';});
    c.innerHTML='<div class="hd"><span class="bar" style="background:'+roleColor(/pilar/i.test(f.nome)?'pilar':isTerca?'telha':'tesoura')+'"></span><h3>'+f.nome+'</h3><span class="q">'+f.qty+'×</span></div>'+
      '<div class="bd"><div class="grid">'+prof+
      '<div class="fld"><label>Quantidade</label><input data-fq="'+fi+'" type="number" value="'+f.qty+'"></div>'+
      (isTerca?'<div class="fld"><label>Comprimento (m)</label><input data-fc="'+fi+'" type="number" step="0.01" value="'+(f.comp||0)+'"></div>':'')+
      '</div></div>';
    elFichas.appendChild(c);
  });
  elFichas.querySelectorAll('input[data-f]').forEach(inp=>inp.addEventListener('input',()=>{FICHAS[+inp.dataset.f].profiles[+inp.dataset.p]=inp.value;compute();}));
  elFichas.querySelectorAll('input[data-fq]').forEach(inp=>inp.addEventListener('input',()=>{FICHAS[+inp.dataset.fq].qty=+inp.value||0;compute();}));
  elFichas.querySelectorAll('input[data-fc]').forEach(inp=>inp.addEventListener('input',()=>{FICHAS[+inp.dataset.fc].comp=+inp.value||0;compute();}));
}

function renderChips(){
  elChips.innerHTML='';
  const sel=CL.find(c=>c.id===selCluster);
  CL.forEach(c=>{
    const fich=FICHAS.find(f=>f.cluster===c.id);
    const chip=document.createElement('div');chip.className='chip'+(c.id===selCluster?' sel':'');
    chip.innerHTML='<span class="dt" style="background:'+roleColor(c.role)+'"></span>';
    const roles=['tesoura','pilar','telha','ignorar'];
    let opts=roles.map(r=>'<option value="'+r+'"'+(c.role===r?' selected':'')+'>'+r+'</option>').join('');
    chip.innerHTML+='<span class="muted">G'+c.id+'</span> <select data-c="'+c.id+'">'+opts+'</select>';
    chip.addEventListener('click',e=>{if(e.target.tagName!=='SELECT'){selCluster=c.id;renderAll();}});
    elChips.appendChild(chip);
  });
  elChips.querySelectorAll('select[data-c]').forEach(s=>s.addEventListener('change',()=>{
    const c=CL[+s.dataset.c];c.role=s.value;
    // re-vincula fichas por papel
    FICHAS.forEach(f=>{if(f.cluster===c.id)f.cluster=-1;});
    autoLinkFichas();renderAll();
  }));
  // botão inverter p/ cluster selecionado se vinculado a ficha
  let hint='Toque num grupo do desenho (ou nas etiquetas G0, G1…) e ajuste o papel. ';
  const f=sel?FICHAS.find(f=>f.cluster===sel.id):null;
  if(f){hint+='G'+sel.id+' = '+f.nome+'. Banzo (vermelho) '+Math.round(f.banzoMM)+' mm · Interno (amarelo) '+Math.round(f.intMM)+' mm. ';
    const b=document.createElement('button');b.className='btn ghost';b.style.marginTop='8px';b.textContent='Inverter banzo ↔ interno (G'+sel.id+')';
    b.addEventListener('click',()=>{invert(f);renderAll();});
    document.getElementById('mhint').innerHTML='';document.getElementById('mhint').appendChild(b);
    document.getElementById('mhint').insertAdjacentHTML('afterbegin','<div style="margin-bottom:6px">'+hint+'</div>');
    return;
  }
  document.getElementById('mhint').textContent=hint;
}

/* ===================== CÁLCULO ===================== */
function compute(){
  const quebra=Math.max(0,num(document.getElementById('quebra').value)||0)/100;
  const barra=Math.max(1,num(document.getElementById('barra').value)||6000);
  const fator=1+quebra;
  // acumula por perfil
  const prof={}; // nome -> {contMM, pieces:[{len,qty}], kgm}
  function add(name){name=cleanProfile(name);if(!name)return null;if(!prof[name])prof[name]={contMM:0,pieces:[],kgm:(KGM[name]!=null?KGM[name]:kgmEstimate(name)),name};return prof[name];}
  for(const f of FICHAS){
    const isTerca=/terça|terca/i.test(f.nome);
    if(isTerca){const p=add(f.profiles[0]||f.nome);if(p&&f.comp)p.pieces.push({len:f.comp*1000,qty:f.qty});continue;}
    // tesoura/pilar: 2 perfis (banzo/interno) medidos
    if(f.profiles.length>=1&&f.banzoMM){const p=add(f.profiles[0]);if(p)p.contMM+=f.banzoMM*f.qty;}
    if(f.profiles.length>=2&&f.intMM){const p=add(f.profiles[1]);if(p)p.contMM+=f.intMM*f.qty;}
    // se 1 perfil só e mediu, joga tudo nele
    if(f.profiles.length===1&&f.intMM){const p=add(f.profiles[0]);if(p)p.contMM+=f.intMM*f.qty;}
  }
  // monta tabela
  let rows='',pesoTotal=0;const kgmInputs=[];
  const list=Object.values(prof);
  if(!list.length){elResult.innerHTML='<span class="muted">Vincule ao menos uma tesoura/pilar a um grupo do desenho, ou confira as fichas.</span>';}
  else{
    rows='<table><thead><tr><th>Perfil</th><th class="n">Barras 6m</th><th class="n">Metros</th><th class="n">kg/m</th><th class="n">Peso</th></tr></thead><tbody>';
    list.forEach((p,pi)=>{
      let bars=0,metros=0;
      if(p.contMM){const tot=p.contMM*fator;bars+=Math.ceil(tot/barra);metros+=tot/1000;}
      for(const pc of p.pieces){const perBar=Math.max(1,Math.floor(barra/pc.len));const b=Math.ceil(pc.qty/perBar);bars+=b;metros+=pc.qty*pc.len/1000;}
      const peso=metros*p.kgm;pesoTotal+=peso;
      rows+='<tr><td>'+p.name+'</td><td class="n">'+bars+'</td><td class="n">'+metros.toFixed(1)+'</td><td class="n"><input data-kgm="'+pi+'" value="'+p.kgm+'"></td><td class="n">'+Math.round(peso)+' kg</td></tr>';
      kgmInputs.push(p);
    });
    rows+='</tbody></table><div class="hint">Barras de '+(barra/1000)+' m. kg/m é estimativa pelos perfis — ajuste com os dados da Perfitec. Terça entra por peças no comprimento da ficha.</div>';
    elResult.innerHTML=rows;
    elResult.querySelectorAll('input[data-kgm]').forEach(inp=>inp.addEventListener('change',()=>{KGM[list[+inp.dataset.kgm].name]=num(inp.value)||0;compute();}));
  }
  document.getElementById('pesoTotal').textContent=Math.round(pesoTotal).toLocaleString('pt-BR')+' kg';
  // telha
  const telhaCl=CL.find(c=>c.role==='telha');const val=num(document.getElementById('telhaval').value)||0;
  if(telhaCl){const w=telhaCl.bb.w*unitF/1000,h=telhaCl.bb.h*unitF/1000;const area=w*h;
    document.getElementById('telhaTotal').innerHTML='telha: '+w.toFixed(2)+'×'+h.toFixed(2)+' = <b style="color:var(--blue)">'+area.toFixed(1)+' m²</b>'+(val?' · R$ '+(area*val).toLocaleString('pt-BR',{minimumFractionDigits:2}):'');}
  else document.getElementById('telhaTotal').textContent='telha: marque o grupo da projeção';
}

function renderAll(){renderFichas();renderChips();draw();compute();}

/* ===================== ZOOM ===================== */
document.getElementById('zin').addEventListener('click',()=>{VB.x+=VB.w*0.12;VB.y+=VB.h*0.12;VB.w*=0.76;VB.h*=0.76;draw();});
document.getElementById('zout').addEventListener('click',()=>{VB.x-=VB.w*0.16;VB.y-=VB.h*0.16;VB.w*=1.32;VB.h*=1.32;draw();});

/* ===================== ENTRADA ===================== */
async function handle(file){
  if(!lib){log('biblioteca não pronta','err');return;}
  unitF=+document.getElementById('unit').value;
  log('lendo "'+file.name+'"…');
  try{
    const buf=new Uint8Array(await file.arrayBuffer());
    readDwg(buf);parseFichas();fitVB();cluster();
    document.getElementById('app').classList.remove('hide');
    document.getElementById('drop').classList.add('hide');
    renderAll();
  }catch(e){log('✗ erro: '+(e&&e.message?e.message:e),'err');}
}
const fi=document.getElementById('file'),dz=document.getElementById('drop');
fi.addEventListener('change',e=>{if(e.target.files[0])handle(e.target.files[0]);});
['dragover','dragenter'].forEach(ev=>dz.addEventListener(ev,e=>{e.preventDefault();dz.classList.add('hot');}));
['dragleave','drop'].forEach(ev=>dz.addEventListener(ev,e=>{e.preventDefault();dz.classList.remove('hot');}));
dz.addEventListener('drop',e=>{const f=e.dataTransfer.files[0];if(f)handle(f);});
['unit','quebra','barra','telhaval'].forEach(id=>document.getElementById(id).addEventListener('input',()=>{unitF=+document.getElementById('unit').value;FICHAS.forEach(f=>{if(f.cluster>=0)splitBanzo(f);});compute();}));
document.getElementById('copy').addEventListener('click',()=>{
  let t='LISTA DE COMPRA — '+new Date().toLocaleDateString('pt-BR')+'\n\n'+elResult.innerText+'\nPeso total: '+document.getElementById('pesoTotal').textContent;
  navigator.clipboard?.writeText(t);document.getElementById('copy').textContent='Copiado!';setTimeout(()=>document.getElementById('copy').textContent='Copiar lista',1500);
});
</script>
