<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1d2127">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Corte RM">
<title>Corte de Estruturas — RM</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f2f2ef; --surface:#ffffff; --surface-2:#f6f6f3;
    --panel:#ffffff; --panel2:#f6f6f3;
    --line:#e4e4e0; --line-2:#d3d3cd;
    --grid:rgba(0,0,0,.038);
    --ink:#1b1b1f; --txt:#1b1b1f; --steel:#8a8a90; --muted:#6c7480; --steel-2:#5f5f66;
    --red:#aa221f; --red-d:#7d1714; --red-soft:#fbeceb; --accent:#aa221f;
    --ok:#1f7a4d; --warn:#b4690e; --sup:#aa221f; --web:#b4690e; --blue:#1f5fae;
    --shadow:0 1px 2px rgba(20,24,32,.05),0 10px 26px rgba(20,24,32,.05);
    --mono:'JetBrains Mono',ui-monospace,monospace; --sans:'Archivo',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background-color:var(--bg);color:var(--txt);font-family:var(--sans);line-height:1.5;-webkit-font-smoothing:antialiased;padding-bottom:80px;
    background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
    background-size:32px 32px;
  }
  /* ---- App bar (carimbo escuro com borda vermelha) ---- */
  .appbar{background:var(--ink);border-bottom:3px solid var(--red);padding:9px 18px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:20}
  .brand{display:flex;align-items:center;gap:13px;min-width:0}
  .logo{height:42px;width:auto;display:block}
  .mono{display:none;width:40px;height:40px;background:var(--red);border-radius:9px;align-items:center;justify-content:center;font-weight:800;font-size:15px;letter-spacing:.5px;color:#fff;flex:none}
  .bdiv{width:1px;height:30px;background:rgba(255,255,255,.16);flex:none}
  .wm{display:flex;flex-direction:column;line-height:1.15;min-width:0}
  .wm1{font-size:14px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:#fff;white-space:nowrap}
  .wm1 b{color:var(--red)}
  .wm2{font-size:9px;color:#aeb4bd;text-transform:uppercase;letter-spacing:.18em;font-family:var(--mono);white-space:nowrap;margin-top:1px}
  .appbar .tag{margin-left:auto;font-family:var(--mono);font-size:10px;color:#aeb4bd;text-transform:uppercase;letter-spacing:1px;flex:none}
  .wrap{max-width:1000px;margin:18px auto 0;padding:0 16px}
  .drop{border:1.5px dashed var(--line-2);border-radius:13px;padding:24px 16px;text-align:center;background:var(--surface);cursor:pointer;box-shadow:var(--shadow);transition:border-color .15s,background .15s}
  .drop:hover{border-color:var(--red)}
  .drop.hot{border-color:var(--red);background:var(--red-soft)}
  .drop b{display:block;font-size:15px;margin-bottom:3px;color:var(--ink)}
  .drop span{font-size:12px;color:var(--muted)}
  .drop input{display:none}
  .log{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:10px;white-space:pre-wrap;word-break:break-word;line-height:1.6}
  .log .ok{color:var(--ok)}.log .err{color:var(--red)}.log .warn{color:var(--warn)}
  h2.sec{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.16em;color:var(--steel-2);margin:24px 2px 10px;display:flex;align-items:center;gap:10px}
  h2.sec::before{content:"";width:14px;height:2px;background:var(--red);flex:none}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:12px;margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow)}
  .card .hd{padding:11px 13px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--line)}
  .card .hd .bar{width:4px;height:18px;border-radius:2px}
  .card .hd h3{font-size:13px;font-weight:700;color:var(--ink)}
  .card .hd .q{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--muted)}
  .card .bd{padding:11px 13px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .fld label{display:block;font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-bottom:4px;font-weight:700}
  .fld input,.fld select{width:100%;background:var(--surface-2);border:1.5px solid var(--line);border-radius:9px;color:var(--ink);font-family:var(--mono);font-size:14px;font-weight:600;padding:8px 10px}
  .fld input:focus,.fld select:focus{outline:none;border-color:var(--red);background:#fff;box-shadow:0 0 0 3px var(--red-soft)}
  .settings{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  @media(max-width:620px){.settings{grid-template-columns:repeat(2,1fr)}}
  .stage{background:#fbfbf9;border:1px solid var(--line);border-radius:12px;overflow:hidden;position:relative;touch-action:none;box-shadow:var(--shadow)}
  .stage svg{width:100%;height:auto;display:block}
  .zoom{position:absolute;top:8px;right:8px;display:flex;gap:6px}
  .zoom button{width:34px;height:34px;border:1px solid var(--line);background:#ffffffe6;color:var(--ink);border-radius:8px;font-size:18px;font-family:var(--mono);cursor:pointer;box-shadow:var(--shadow)}
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}
  .chip{display:flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:5px 10px;font-size:12px;cursor:pointer;color:var(--steel-2)}
  .chip.sel{border-color:var(--red);background:var(--red-soft);color:var(--ink)}
  .chip .dt{width:9px;height:9px;border-radius:50%}
  .chip select{background:transparent;border:none;color:inherit;font-size:12px;font-family:var(--sans)}
  table{width:100%;border-collapse:collapse;font-size:12px}
  th,td{text-align:left;padding:7px 6px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-weight:700;font-size:9.5px;text-transform:uppercase;letter-spacing:.1em}
  td{font-family:var(--mono);color:var(--ink)}
  td.n,th.n{text-align:right}
  td input{width:74px;background:var(--surface-2);border:1.5px solid var(--line);border-radius:6px;color:var(--ink);font-family:var(--mono);font-size:12px;padding:4px 6px;text-align:right}
  td input:focus{outline:none;border-color:var(--red);background:#fff;box-shadow:0 0 0 3px var(--red-soft)}
  .btn{display:inline-flex;align-items:center;gap:6px;background:var(--red);color:#fff;border:1px solid var(--red);border-radius:8px;padding:9px 14px;font-size:13px;font-weight:600;font-family:var(--sans);cursor:pointer;transition:.12s}
  .btn:hover{background:var(--red-d);border-color:var(--red-d)}
  .btn.ghost{background:var(--surface);border:1px solid var(--line-2);color:var(--steel-2)}
  .btn.ghost:hover{border-color:var(--red);color:var(--red);background:var(--red-soft)}
  .pill{display:inline-block;font-family:var(--mono);font-size:11px;background:var(--surface-2);border:1px solid var(--line);border-radius:6px;padding:2px 7px;color:var(--muted)}
  .total{background:var(--surface);border:1.5px solid var(--red);border-radius:13px;padding:15px;margin-top:6px;display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;box-shadow:var(--shadow)}
  .total .big{font-family:var(--mono);font-size:30px;font-weight:700;color:var(--red)}
  .total .m{font-size:12px;color:var(--muted)}
  .hide{display:none}
  .muted{color:var(--muted)}
  .hint{font-size:11px;color:var(--muted);margin-top:8px;line-height:1.5}
  .btnrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
  .obra-item{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:9px 11px;margin-bottom:8px;box-shadow:var(--shadow)}
  .obra-item .meta{flex:1}.obra-item .meta b{font-weight:700;font-size:13px;color:var(--ink)}
  .obra-item .dt{font-family:var(--mono);font-size:11px;color:var(--muted)}
  .obra-item button{background:var(--surface);border:1px solid var(--line-2);color:var(--steel-2);border-radius:7px;padding:5px 10px;font-size:12px;cursor:pointer}
  .obra-item button:hover{border-color:var(--red);color:var(--red)}
  #printArea{padding:20px;color:#111;background:#fff;border-radius:12px;margin-top:14px}
  #printArea h2{font-size:18px;margin:0 0 4px}
  #printArea table{width:100%;border-collapse:collapse;margin-top:8px}
  #printArea th,#printArea td{border:1px solid #ccc;padding:6px 8px;text-align:left;font-size:12px;color:#111}
  #printArea th{background:#f3f3f3}
  @media print{body{background:#fff;padding:0}body *{visibility:hidden}#printArea,#printArea *{visibility:visible}#printArea{position:absolute;left:0;top:0;width:100%;margin:0;border-radius:0;display:block!important}#printArea button{display:none}}
</style>
</head>
<body>
  <div class="appbar">
    <div class="brand">
      <img id="logo" class="logo" src="logo.png" alt="RM Estruturas" onerror="this.style.display='none';document.getElementById('mono').style.display='flex';">
      <div id="mono" class="mono">RM</div>
      <span class="bdiv"></span>
      <div class="wm"><span class="wm1"><b>RM</b> ESTRUTURAS</span><span class="wm2">Corte de Estruturas</span></div>
    </div>
    <span class="tag" id="ver">v4</span>
  </div>
  <div class="wrap">

    <label class="drop" id="drop"><b>Abrir DWG</b><span>toque ou arraste · roda no seu navegador</span><input type="file" id="file" accept=".dwg,.dxf"></label>
    <div class="log" id="log"></div>

    <div id="app" class="hide">
      <!-- AJUSTES -->
      <h2 class="sec">Ajustes</h2>
      <div class="fld" style="margin-bottom:8px"><label>Obra / Cliente</label><input id="obra" placeholder="ex.: Galpão Rogério"></div>
      <div class="settings">
        <div class="fld"><label>Unidade do DWG</label><select id="unit"><option value="10">cm → mm</option><option value="1">mm</option><option value="1000">m → mm</option></select></div>
        <div class="fld"><label>Quebra %</label><input id="quebra" type="number" value="10" inputmode="numeric"></div>
        <div class="fld"><label>Barra (mm)</label><input id="barra" type="number" value="6000" step="100" inputmode="numeric"></div>
        <div class="fld"><label>Telha R$/m²</label><input id="telhaval" type="number" value="0" step="0.01" inputmode="decimal"></div>
      </div>

      <!-- FICHAS -->
      <h2 class="sec">Fichas lidas do desenho</h2>
      <div id="fichas"></div>

      <!-- MEDIÇÃO -->
      <h2 class="sec">Medição — toque num grupo do desenho e diga o que é</h2>
      <div class="stage" id="stage">
        <svg id="svg"></svg>
        <div class="zoom"><button id="zin">+</button><button id="zout">−</button></div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;margin-top:10px"><span class="muted" style="font-size:11px;white-space:nowrap">Agrupamento</span><input id="sens" type="range" min="10" max="45" value="13" style="flex:1"><span class="muted" style="font-size:11px;white-space:nowrap" id="sensv">fino</span></div>
      <div class="chips" id="chips"></div>
      <div class="hint" id="mhint"></div>

      <!-- TELHA -->
      <h2 class="sec">Telha (planta baixa)</h2>
      <div class="card"><div class="bd" id="telhaCard"></div></div>

      <!-- RESULTADO -->
      <h2 class="sec">Lista de compra</h2>
      <div class="card"><div class="bd" id="result"></div></div>
      <div class="total"><span class="big" id="pesoTotal">0 kg</span><span class="m">peso total de aço · <span id="telhaTotal"></span></span></div>
      <div class="btnrow">
        <button class="btn" id="copy">Copiar lista</button>
        <button class="btn ghost" id="print">Imprimir / PDF</button>
        <button class="btn ghost" id="saveObra">Salvar obra</button>
      </div>

      <h2 class="sec">Obras salvas</h2>
      <div id="historico"></div>
    </div>
    <div id="printArea" class="hide"></div>
  </div>

<script type="module">
/* ===================== CARREGAMENTO (provado) ===================== */
const logEl=document.getElementById('log');
function log(m,c){const s=document.createElement('span');if(c)s.className=c;s.textContent=m+'\n';logEl.appendChild(s);}
const BASE='https://cdn.jsdelivr.net/npm/@mlightcad/libredwg-web';
let LibreDwg,Dwg_File_Type,lib=null,wasmBinary=null,wasmUrl=null;
log('carregando módulo…');
for(const u of [BASE+'/wasm/libredwg-web.wasm',BASE+'/wasm/libredwg.wasm']){try{const r=await fetch(u);if(r.ok){wasmBinary=await r.arrayBuffer();wasmUrl=u;log('✓ wasm '+Math.round(wasmBinary.byteLength/1024)+' KB','ok');break;}}catch(e){}}
try{const m=await import(BASE+'/+esm');LibreDwg=m.LibreDwg;Dwg_File_Type=m.Dwg_File_Type;}catch(e){log('✗ wrapper: '+e.message,'err');}
async function init(){
  const tries=[
    ['create(dir)',async()=>LibreDwg&&await LibreDwg.create(BASE+'/wasm/')],
    ['create(opts)',async()=>LibreDwg&&await LibreDwg.create({wasmBinary,locateFile:()=>wasmUrl})],
    ['raw+ctor',async()=>{const g=await import(BASE+'/wasm/libredwg-web.js');const cm=g.createModule||g.default||g;const mod=await cm({wasmBinary,locateFile:()=>wasmUrl});if(LibreDwg){try{return new LibreDwg(mod);}catch(_){}}return mod;}]
  ];
  for(const [n,fn] of tries){try{const c=await fn();if(c&&(typeof c.convert==='function'||typeof c.dwg_read_data==='function')){log('✓ pronto ('+n+')','ok');return c;}}catch(e){}}
  return null;
}
lib=await init();
if(!lib)log('✗ não inicializou a biblioteca','err');

/* ===================== EXTRAÇÃO ===================== */
const P=p=>p?({x:p.x??p[0]??0,y:p.y??p[1]??0}):null;
const dist=(a,b)=>Math.hypot(b.x-a.x,b.y-a.y);
function collectEntities(db){if(Array.isArray(db))return db;for(const k of['entities','modelSpaceEntities','modelSpace'])if(Array.isArray(db?.[k]))return db[k];for(const k in db){const v=db[k];if(Array.isArray(v)&&v.length&&typeof v[0]==='object'&&'type'in v[0])return v;}return[];}
function segsOf(e){const t=(e.type||'').toUpperCase();
  if(t==='LINE'){const a=P(e.startPoint||e.start||e.vertices?.[0]),b=P(e.endPoint||e.end||e.vertices?.[1]);return a&&b?[[a,b]]:[];}
  if(t==='LWPOLYLINE'||t==='POLYLINE'){const v=(e.vertices||e.points||[]).map(P).filter(Boolean);const s=[];for(let i=0;i<v.length-1;i++)s.push([v[i],v[i+1]]);if((e.closed||e.isClosed)&&v.length>2)s.push([v[v.length-1],v[0]]);return s;}
  return[];}
function textOf(e){const t=(e.type||'').toUpperCase();if(t==='TEXT'||t==='MTEXT'||t==='ATTRIB')return e.text??e.textValue??e.contents??e.string??null;return null;}

let SEG=[],TXT=[],CL=[],FICHAS=[],unitF=10;
const KGM={}; // overrides de kg/m por perfil
let telha={w:0,l:0,manual:false}; // dimensões da telha (m), editáveis
const FORCE={}; // ficha -> cluster escolhido manualmente
let LASTROWS=[],LASTPESO=0; // última lista calculada (p/ imprimir/salvar)

function readDwg(buf){
  const ft=Dwg_File_Type?.DWG;
  let dwg;try{dwg=lib.dwg_read_data(buf,ft);}catch(_){dwg=lib.dwg_read_data(buf.buffer,ft);}
  const db=typeof lib.convert==='function'?lib.convert(dwg):dwg;
  try{lib.dwg_free&&lib.dwg_free(dwg);}catch(_){}
  const ents=collectEntities(db);
  SEG=[];TXT=[];
  for(const e of ents){
    const lay=(e.layer??'?')+'';
    for(const [a,b] of segsOf(e)) if(dist(a,b)>0) SEG.push({a,b,layer:lay,cl:-1,cat:0});
    const tx=textOf(e);if(tx!=null&&(''+tx).trim()){const pos=P(e.insertionPoint||e.position||e.startPoint||e.basePoint||e.location||e.attachmentPoint)||{x:0,y:0};TXT.push({s:(''+tx).trim(),x:pos.x,y:pos.y});}
  }
  log('✓ '+ents.length+' entidades · '+SEG.length+' segmentos · '+TXT.length+' textos','ok');
}

/* ===================== FICHAS (texto) ===================== */
function num(s){return parseFloat((s+'').replace(',','.'));}
function cleanProfile(s){return s.replace(/\s+/g,'').replace(/[#]/g,'').replace(/\(.*?\)/g,'').trim();}
function kgmEstimate(prof){
  const nums=(prof.match(/\d+(?:[.,]\d+)?/g)||[]).map(num);
  if(nums.length<2)return 0;
  const thick=nums.find(n=>!Number.isInteger(n))??nums[nums.length-1];
  const dims=nums.filter(n=>n!==thick);
  let dev=0;
  if(dims.length>=3)dev=dims[0]+2*dims[1]+2*dims[2];
  else if(dims.length===2)dev=dims[0]+2*dims[1];
  else dev=dims[0];
  return +(dev*thick*0.00785).toFixed(2); // kg/m (mm,mm)
}
function parseFichas(){
  FICHAS=[];
  for(const t of TXT){
    const raw=t.s;
    const lines=raw.split(/\\P/).map(l=>l.replace(/\\[A-Za-z][^;]*;/g,'').replace(/[{}]/g,'').trim()).filter(Boolean);
    if(!lines.length)continue;
    const nome=lines[0].toUpperCase();
    const profiles=[];let qty=1,comp=null;
    for(let i=1;i<lines.length;i++){
      const l=lines[i];
      if(/quantidade/i.test(l)){const m=l.match(/(\d+)/);if(m)qty=+m[1];}
      else if(/x/i.test(l)&&/\d/.test(l)){profiles.push(cleanProfile(l));}
      const cm=l.match(/\(([\d.,]+)\s*m\)/i)||raw.match(/\(([\d.,]+)\s*m\)/i);if(cm)comp=num(cm[1]);
    }
    if(profiles.length||/tesoura|terça|terca|pilar|trelica|treliça|calha|contravent/i.test(nome))
      FICHAS.push({nome,profiles,qty,comp,cluster:-1,banzoMM:0,intMM:0,tx:{x:t.x,y:t.y}});
  }
}

/* ===================== CLUSTER (conexão por nós) ===================== */
function bbox(idxs){let mnx=Infinity,mny=Infinity,mxx=-Infinity,mxy=-Infinity;for(const i of idxs){for(const p of[SEG[i].a,SEG[i].b]){mnx=Math.min(mnx,p.x);mny=Math.min(mny,p.y);mxx=Math.max(mxx,p.x);mxy=Math.max(mxy,p.y);}}return{mnx,mny,mxx,mxy,w:mxx-mnx,h:mxy-mny};}
let CELL=0.013; // tamanho da célula como fração do desenho (sensibilidade)
function cluster(){
  for(const k in FORCE)delete FORCE[k];
  const n=SEG.length;if(!n){CL=[];return;}
  const all=bbox([...Array(n).keys()]);
  const cell=Math.max(all.w,all.h)*CELL||1;
  const cols=Math.max(1,Math.ceil(all.w/cell)+1),rows=Math.max(1,Math.ceil(all.h/cell)+1);
  const cx=x=>Math.min(cols-1,Math.max(0,Math.floor((x-all.mnx)/cell)));
  const cy=y=>Math.min(rows-1,Math.max(0,Math.floor((y-all.mny)/cell)));
  const ci=(c,r)=>r*cols+c;
  // marca células ocupadas por cada segmento (amostrando ao longo dele)
  const cellSegs=new Map();
  for(let i=0;i<n;i++){const s=SEG[i];const steps=Math.max(1,Math.ceil(dist(s.a,s.b)/cell));
    for(let t=0;t<=steps;t++){const x=s.a.x+(s.b.x-s.a.x)*t/steps,y=s.a.y+(s.b.y-s.a.y)*t/steps;const k=ci(cx(x),cy(y));if(!cellSegs.has(k))cellSegs.set(k,new Set());cellSegs.get(k).add(i);}}
  // componentes conectados das células (8 vizinhos) = regiões espaciais
  const visited=new Set();const comps=[];
  for(const start of cellSegs.keys()){
    if(visited.has(start))continue;visited.add(start);
    const stack=[start];const segSet=new Set();
    while(stack.length){const k=stack.pop();const r=Math.floor(k/cols),c=k-r*cols;
      for(const i of (cellSegs.get(k)||[]))segSet.add(i);
      for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){if(!dr&&!dc)continue;const nr=r+dr,nc=c+dc;if(nr<0||nc<0||nr>=rows||nc>=cols)continue;const nk=ci(nc,nr);if(cellSegs.has(nk)&&!visited.has(nk)){visited.add(nk);stack.push(nk);}}}
    comps.push([...segSet]);
  }
  const totArea=(all.w*all.h)||1;
  CL=[];let id=0;
  for(const idxs of comps){
    const bb=bbox(idxs);let len=0;const lc={};
    for(const i of idxs){len+=dist(SEG[i].a,SEG[i].b);lc[SEG[i].layer]=(lc[SEG[i].layer]||0)+1;}
    const layer=Object.entries(lc).sort((a,b)=>b[1]-a[1])[0][0];
    const aspect=Math.max(bb.w,bb.h)/(Math.min(bb.w,bb.h)||1);
    const areaFrac=(bb.w*bb.h)/totArea;
    let role='ignorar';
    if(/pilar/i.test(layer))role='pilar';
    else if(idxs.length<=10&&aspect<6&&areaFrac>0.02)role='telha';
    else if(aspect>=4&&idxs.length>=8)role='tesoura';
    CL.push({idxs,bb,len,layer,aspect,role,id});id++;
  }
  CL.sort((a,b)=>b.len-a.len);CL.forEach((c,i)=>c.id=i);
  CL.forEach(c=>c.idxs.forEach(i=>SEG[i].cl=c.id));
  telha.manual=false;
  autoLinkFichas();
}
function autoLinkFichas(){
  FICHAS.forEach(f=>f.cluster=-1);
  FICHAS.forEach((f,fi)=>{
    let role=null;
    if(/tesoura|trelica|treliça/i.test(f.nome))role='tesoura';
    else if(/pilar/i.test(f.nome))role='pilar';
    if(!role)return;
    // override manual: você marcou um grupo como tesoura/pilar -> mede aquele
    if(FORCE[fi]!=null&&CL[FORCE[fi]]){const c=CL[FORCE[fi]];c.role=role;f.cluster=c.id;splitBanzo(f);return;}
    const cand=CL.filter(c=>c.role===role);
    if(!cand.length)return;
    // palpite inicial: a linha única tem MENOS segmentos que a vista 2D
    const best=cand.slice().sort((a,b)=>a.idxs.length-b.idxs.length)[0];
    f.cluster=best.id;splitBanzo(f);
  });
  // tesoura/pilar não vinculado (vista 2D, cópias) vira "ignorar"
  const linked=new Set(FICHAS.filter(f=>f.cluster>=0).map(f=>f.cluster));
  for(const c of CL){if((c.role==='tesoura'||c.role==='pilar')&&!linked.has(c.id))c.role='ignorar';}
}

/* ===================== SPLIT BANZO×INTERNO (ângulo) ===================== */
function splitBanzo(f){
  const c=CL[f.cluster];if(!c){f.banzoMM=0;f.intMM=0;return;}
  const horizontal=c.bb.w>=c.bb.h; // eixo longo
  let banzo=0,intr=0;
  for(const i of c.idxs){
    const s=SEG[i];const ang=Math.abs(Math.atan2(s.b.y-s.a.y,s.b.x-s.a.x)*180/Math.PI);
    const a=Math.min(ang,180-ang); // 0=horizontal,90=vertical
    const flat = horizontal ? (a<=22) : (a>=68);
    s.cat = flat?1:2; // 1=banzo,2=interno
    const L=dist(s.a,s.b)*unitF;
    if(flat)banzo+=L;else intr+=L;
  }
  f.banzoMM=banzo;f.intMM=intr;
}
function invert(f){const c=CL[f.cluster];if(!c)return;let b=0,it=0;for(const i of c.idxs){const s=SEG[i];s.cat=s.cat===1?2:1;const L=dist(s.a,s.b)*unitF;if(s.cat===1)b+=L;else it+=L;}f.banzoMM=b;f.intMM=it;}

/* ===================== RENDER DESENHO ===================== */
let VB=null;
const svg=document.getElementById('svg');
function fitVB(){const bb=bbox([...Array(SEG.length).keys()]);const pad=Math.max(bb.w,bb.h)*0.04;VB={x:bb.mnx-pad,y:bb.mny-pad,w:bb.w+2*pad,h:bb.h+2*pad};}
function draw(){
  if(!SEG.length)return;
  const W=960,H=Math.max(180,Math.min(560,W*VB.h/VB.w));
  const sx=x=>(x-VB.x)/VB.w*W, sy=y=>H-(y-VB.y)/VB.h*H;
  let s='';
  for(let i=0;i<SEG.length;i++){
    const g=SEG[i];const sel=selCluster===g.cl;
    let col='#9aa0a8';
    const fich=FICHAS.find(f=>f.cluster===g.cl);
    if(fich){col=g.cat===1?'var(--sup)':g.cat===2?'var(--web)':'#9aa0a8';}
    else if(CL[g.cl]){const r=CL[g.cl].role;col=r==='telha'?'var(--blue)':r==='pilar'?'#6d4ec9':r==='ignorar'?'#cfd2cd':'#7a818a';}
    if(sel)col='var(--red)';
    s+='<line x1="'+sx(g.a.x).toFixed(1)+'" y1="'+sy(g.a.y).toFixed(1)+'" x2="'+sx(g.b.x).toFixed(1)+'" y2="'+sy(g.b.y).toFixed(1)+'" stroke="'+col+'" stroke-width="'+(sel?1.6:1)+'"/>';
  }
  // caixas clicáveis por cluster
  for(const c of CL){const x=sx(c.bb.mnx),y=sy(c.bb.mxy),w=(c.bb.w/VB.w*W),h=(c.bb.h/VB.h*H);
    s+='<rect data-cl="'+c.id+'" x="'+(x-4).toFixed(1)+'" y="'+(y-4).toFixed(1)+'" width="'+(w+8).toFixed(1)+'" height="'+(h+8).toFixed(1)+'" fill="transparent" stroke="'+(selCluster===c.id?'#aa221f99':'transparent')+'" stroke-dasharray="4 3"/>';}
  svg.setAttribute('viewBox','0 0 '+W+' '+H.toFixed(0));
  svg.innerHTML=s;
  svg.querySelectorAll('rect[data-cl]').forEach(r=>r.addEventListener('click',()=>{selCluster=+r.getAttribute('data-cl');renderAll();}));
}
let selCluster=-1;

/* ===================== RENDER UI ===================== */
const elFichas=document.getElementById('fichas'),elChips=document.getElementById('chips'),elResult=document.getElementById('result');
function roleColor(r){return r==='tesoura'?'var(--sup)':r==='pilar'?'#6d4ec9':r==='telha'?'var(--blue)':'#7a818a';}

function renderFichas(){
  elFichas.innerHTML='';
  FICHAS.forEach((f,fi)=>{
    const isTerca=/terça|terca/i.test(f.nome);
    const c=document.createElement('div');c.className='card';
    let prof='';f.profiles.forEach((p,pi)=>{const lbl=f.profiles.length===2?(pi===0?'Banzo':'Interno'):(isTerca?'Perfil':'Perfil '+(pi+1));
      prof+='<div class="fld"><label>'+lbl+'</label><input data-f="'+fi+'" data-p="'+pi+'" value="'+p+'"></div>';});
    c.innerHTML='<div class="hd"><span class="bar" style="background:'+roleColor(/pilar/i.test(f.nome)?'pilar':isTerca?'telha':'tesoura')+'"></span><h3>'+f.nome+'</h3><span class="q">'+f.qty+'×</span></div>'+
      '<div class="bd"><div class="grid">'+prof+
      '<div class="fld"><label>Quantidade</label><input data-fq="'+fi+'" type="number" value="'+f.qty+'"></div>'+
      (isTerca?'<div class="fld"><label>Comprimento (m)</label><input data-fc="'+fi+'" type="number" step="0.01" value="'+(f.comp||0)+'"></div>':'')+
      '</div></div>';
    elFichas.appendChild(c);
  });
  elFichas.querySelectorAll('input[data-f]').forEach(inp=>inp.addEventListener('input',()=>{FICHAS[+inp.dataset.f].profiles[+inp.dataset.p]=inp.value;compute();}));
  elFichas.querySelectorAll('input[data-fq]').forEach(inp=>inp.addEventListener('input',()=>{FICHAS[+inp.dataset.fq].qty=+inp.value||0;compute();}));
  elFichas.querySelectorAll('input[data-fc]').forEach(inp=>inp.addEventListener('input',()=>{FICHAS[+inp.dataset.fc].comp=+inp.value||0;compute();}));
}

function renderChips(){
  elChips.innerHTML='';
  const sel=CL.find(c=>c.id===selCluster);
  CL.forEach(c=>{
    const fich=FICHAS.find(f=>f.cluster===c.id);
    const chip=document.createElement('div');chip.className='chip'+(c.id===selCluster?' sel':'');
    chip.innerHTML='<span class="dt" style="background:'+roleColor(c.role)+'"></span>';
    const roles=['tesoura','pilar','telha','ignorar'];
    let opts=roles.map(r=>'<option value="'+r+'"'+(c.role===r?' selected':'')+'>'+r+'</option>').join('');
    chip.innerHTML+='<span class="muted">G'+c.id+'</span> <select data-c="'+c.id+'">'+opts+'</select>';
    chip.addEventListener('click',e=>{if(e.target.tagName!=='SELECT'){selCluster=c.id;renderAll();}});
    elChips.appendChild(chip);
  });
  elChips.querySelectorAll('select[data-c]').forEach(s=>s.addEventListener('change',()=>{
    const c=CL[+s.dataset.c];c.role=s.value;telha.manual=false;
    if(s.value==='tesoura'||s.value==='pilar'){
      const fi=FICHAS.findIndex(f=>(s.value==='tesoura'?/tesoura|trelic/i:/pilar/i).test(f.nome));
      if(fi>=0)FORCE[fi]=c.id;
    }else{Object.keys(FORCE).forEach(k=>{if(FORCE[k]===c.id)delete FORCE[k];});}
    autoLinkFichas();renderAll();
  }));
  // botão inverter p/ cluster selecionado se vinculado a ficha
  let hint='Marque a linha única (a que tem etiqueta em cima) como tesoura/pilar — ele mede esse grupo. As vistas 2D e cópias, deixe em “ignorar”. ';
  const f=sel?FICHAS.find(f=>f.cluster===sel.id):null;
  if(f){hint+='G'+sel.id+' = '+f.nome+'. Banzo (vermelho) '+Math.round(f.banzoMM)+' mm · Interno (amarelo) '+Math.round(f.intMM)+' mm. ';
    const b=document.createElement('button');b.className='btn ghost';b.style.marginTop='8px';b.textContent='Inverter banzo ↔ interno (G'+sel.id+')';
    b.addEventListener('click',()=>{invert(f);renderAll();});
    document.getElementById('mhint').innerHTML='';document.getElementById('mhint').appendChild(b);
    document.getElementById('mhint').insertAdjacentHTML('afterbegin','<div style="margin-bottom:6px">'+hint+'</div>');
    return;
  }
  document.getElementById('mhint').textContent=hint;
}

/* ===================== CÁLCULO ===================== */
function compute(){
  const quebra=Math.max(0,num(document.getElementById('quebra').value)||0)/100;
  const barra=Math.max(1,num(document.getElementById('barra').value)||6000);
  const fator=1+quebra;
  // acumula por perfil
  const prof={}; // nome -> {contMM, pieces:[{len,qty}], kgm}
  function add(name){name=cleanProfile(name);if(!name)return null;if(!prof[name])prof[name]={contMM:0,pieces:[],kgm:(KGM[name]!=null?KGM[name]:kgmEstimate(name)),name};return prof[name];}
  for(const f of FICHAS){
    const isTerca=/terça|terca/i.test(f.nome);
    if(isTerca){const p=add(f.profiles[0]||f.nome);if(p&&f.comp)p.pieces.push({len:f.comp*1000,qty:f.qty});continue;}
    // tesoura/pilar: 2 perfis (banzo/interno) medidos
    if(f.profiles.length>=1&&f.banzoMM){const p=add(f.profiles[0]);if(p)p.contMM+=f.banzoMM*f.qty;}
    if(f.profiles.length>=2&&f.intMM){const p=add(f.profiles[1]);if(p)p.contMM+=f.intMM*f.qty;}
    // se 1 perfil só e mediu, joga tudo nele
    if(f.profiles.length===1&&f.intMM){const p=add(f.profiles[0]);if(p)p.contMM+=f.intMM*f.qty;}
  }
  // monta tabela
  let rows='',pesoTotal=0;const kgmInputs=[];
  const list=Object.values(prof);
  if(!list.length){elResult.innerHTML='<span class="muted">Vincule ao menos uma tesoura/pilar a um grupo do desenho, ou confira as fichas.</span>';}
  else{
    rows='<table><thead><tr><th>Perfil</th><th class="n">Barras 6m</th><th class="n">Metros</th><th class="n">kg/m</th><th class="n">Peso</th></tr></thead><tbody>';
    LASTROWS=[];
    list.forEach((p,pi)=>{
      let bars=0,metros=0;
      if(p.contMM){const tot=p.contMM*fator;bars+=Math.ceil(tot/barra);metros+=tot/1000;}
      for(const pc of p.pieces){const perBar=Math.max(1,Math.floor(barra/pc.len));const b=Math.ceil(pc.qty/perBar);bars+=b;metros+=pc.qty*pc.len/1000;}
      const peso=metros*p.kgm;pesoTotal+=peso;
      LASTROWS.push({name:p.name,bars,metros,kgm:p.kgm,peso});
      rows+='<tr><td>'+p.name+'</td><td class="n">'+bars+'</td><td class="n">'+metros.toFixed(1)+'</td><td class="n"><input data-kgm="'+pi+'" value="'+p.kgm+'"></td><td class="n">'+Math.round(peso)+' kg</td></tr>';
      kgmInputs.push(p);
    });
    rows+='</tbody></table><div class="hint">Barras de '+(barra/1000)+' m. kg/m é estimativa pelos perfis — ajuste com os dados da Perfitec. Terça entra por peças no comprimento da ficha.</div>';
    elResult.innerHTML=rows;
    elResult.querySelectorAll('input[data-kgm]').forEach(inp=>inp.addEventListener('change',()=>{KGM[list[+inp.dataset.kgm].name]=num(inp.value)||0;compute();save();}));
  }
  LASTPESO=pesoTotal;
  document.getElementById('pesoTotal').textContent=Math.round(pesoTotal).toLocaleString('pt-BR')+' kg';
  computeTelha();
}

function renderTelha(){
  const el=document.getElementById('telhaCard');if(!el)return;
  const cands=CL.filter(c=>c.role==='telha').sort((a,b)=>(b.bb.w*b.bb.h)-(a.bb.w*a.bb.h));
  const c=cands[0];
  if(!c){el.innerHTML='<span class="muted">Marque o grupo do retângulo da planta como “telha” nas etiquetas acima — aí aparece a largura × comprimento aqui.</span>';telha={w:0,l:0,manual:false};computeTelha();return;}
  if(!telha.manual){telha.w=+(c.bb.w*unitF/1000).toFixed(2);telha.l=+(c.bb.h*unitF/1000).toFixed(2);}
  el.innerHTML='<div class="grid">'+
    '<div class="fld"><label>Largura (m)</label><input id="tlw" type="number" step="0.01" inputmode="decimal" value="'+telha.w+'"></div>'+
    '<div class="fld"><label>Comprimento (m)</label><input id="tll" type="number" step="0.01" inputmode="decimal" value="'+telha.l+'"></div></div>'+
    '<div class="hint" id="telhaArea"></div>';
  document.getElementById('tlw').addEventListener('input',e=>{telha.w=num(e.target.value)||0;telha.manual=true;computeTelha();});
  document.getElementById('tll').addEventListener('input',e=>{telha.l=num(e.target.value)||0;telha.manual=true;computeTelha();});
  computeTelha();
}
function computeTelha(){
  const val=num(document.getElementById('telhaval').value)||0;
  const area=(telha.w||0)*(telha.l||0);
  const t=area?('<b style="color:var(--blue)">'+area.toFixed(1)+' m²</b>'+(val?' · R$ '+(area*val).toLocaleString('pt-BR',{minimumFractionDigits:2}):'')):'—';
  const ta=document.getElementById('telhaArea');if(ta)ta.innerHTML='Área: '+t;
  const tt=document.getElementById('telhaTotal');if(tt)tt.innerHTML=area?('telha: '+t):'telha: marque o grupo da projeção';
}
function renderAll(){renderFichas();renderChips();draw();renderTelha();compute();}

/* ===================== ZOOM ===================== */
document.getElementById('zin').addEventListener('click',()=>{VB.x+=VB.w*0.12;VB.y+=VB.h*0.12;VB.w*=0.76;VB.h*=0.76;draw();});
document.getElementById('zout').addEventListener('click',()=>{VB.x-=VB.w*0.16;VB.y-=VB.h*0.16;VB.w*=1.32;VB.h*=1.32;draw();});

/* ===================== ENTRADA ===================== */
async function handle(file){
  if(!lib){log('biblioteca não pronta','err');return;}
  unitF=+document.getElementById('unit').value;
  log('lendo "'+file.name+'"…');
  try{
    const buf=new Uint8Array(await file.arrayBuffer());
    readDwg(buf);parseFichas();fitVB();cluster();
    document.getElementById('app').classList.remove('hide');
    document.getElementById('drop').classList.add('hide');
    renderAll();
  }catch(e){log('✗ erro: '+(e&&e.message?e.message:e),'err');}
}
const fi=document.getElementById('file'),dz=document.getElementById('drop');
fi.addEventListener('change',e=>{if(e.target.files[0])handle(e.target.files[0]);});
['dragover','dragenter'].forEach(ev=>dz.addEventListener(ev,e=>{e.preventDefault();dz.classList.add('hot');}));
['dragleave','drop'].forEach(ev=>dz.addEventListener(ev,e=>{e.preventDefault();dz.classList.remove('hot');}));
dz.addEventListener('drop',e=>{const f=e.dataTransfer.files[0];if(f)handle(f);});
['unit','quebra','barra','telhaval'].forEach(id=>document.getElementById(id).addEventListener('input',()=>{unitF=+document.getElementById('unit').value;FICHAS.forEach(f=>{if(f.cluster>=0)splitBanzo(f);});compute();save();}));
document.getElementById('obra').addEventListener('input',save);
document.getElementById('sens').addEventListener('input',()=>{const v=+document.getElementById('sens').value;CELL=v/1000;document.getElementById('sensv').textContent=v<15?'fino':v>30?'grosso':'médio';if(SEG.length){cluster();renderAll();}});
document.getElementById('copy').addEventListener('click',()=>{
  const obra=document.getElementById('obra').value;
  const tarea=document.getElementById('telhaArea');
  let t='LISTA DE COMPRA'+(obra?' — '+obra:'')+'\n'+new Date().toLocaleDateString('pt-BR')+'\n\n'+elResult.innerText+'\n'+(tarea?('Telha — '+tarea.innerText+'\n'):'')+'Peso total de aço: '+document.getElementById('pesoTotal').textContent;
  navigator.clipboard?.writeText(t);document.getElementById('copy').textContent='Copiado!';setTimeout(()=>document.getElementById('copy').textContent='Copiar lista',1500);
});
function save(){try{localStorage.setItem('corteRM',JSON.stringify({KGM,obra:document.getElementById('obra').value,unit:document.getElementById('unit').value,quebra:document.getElementById('quebra').value,barra:document.getElementById('barra').value,telhaval:document.getElementById('telhaval').value}));}catch(e){}}
function load(){try{const d=JSON.parse(localStorage.getItem('corteRM')||'{}');if(d.KGM)Object.assign(KGM,d.KGM);['obra','unit','quebra','barra','telhaval'].forEach(k=>{const el=document.getElementById(k);if(el&&d[k]!=null&&d[k]!=='')el.value=d[k];});}catch(e){}}
load();

/* ===================== IMPRIMIR / OBRAS SALVAS ===================== */
function cleanTable(rows){let h='<table><thead><tr><th>Perfil</th><th>Barras 6m</th><th>Metros</th><th>kg/m</th><th>Peso</th></tr></thead><tbody>';for(const r of (rows||[]))h+='<tr><td>'+r.name+'</td><td>'+r.bars+'</td><td>'+(+r.metros).toFixed(1)+'</td><td>'+r.kgm+'</td><td>'+Math.round(r.peso)+' kg</td></tr>';return h+'</tbody></table>';}
function snapHTML(obra,date,rows,peso,tel){return '<h2>Lista de compra — '+(obra||'(sem obra)')+'</h2><div style="font-family:monospace;color:#555;margin-bottom:10px">'+new Date(date).toLocaleDateString('pt-BR')+'</div>'+cleanTable(rows)+(tel?'<p style="margin-top:10px"><b>Telha:</b> '+tel+'</p>':'')+'<p><b>Peso total de aço:</b> '+Math.round(peso||0).toLocaleString('pt-BR')+' kg</p>';}
function loadObras(){try{return JSON.parse(localStorage.getItem('corteRM_obras')||'[]');}catch(e){return[];}}
function renderHistorico(){const el=document.getElementById('historico');if(!el)return;const arr=loadObras();if(!arr.length){el.innerHTML='<span class="muted" style="font-size:12px">Nenhuma obra salva ainda.</span>';return;}el.innerHTML=arr.map((o,i)=>'<div class="obra-item"><div class="meta"><b>'+(o.obra||'—')+'</b><div class="dt">'+new Date(o.date).toLocaleDateString('pt-BR')+' · '+Math.round(o.peso||0).toLocaleString('pt-BR')+' kg</div></div><button data-open="'+i+'">abrir</button><button data-del="'+i+'">✕</button></div>').join('');el.querySelectorAll('button[data-open]').forEach(b=>b.addEventListener('click',()=>openObra(+b.dataset.open)));el.querySelectorAll('button[data-del]').forEach(b=>b.addEventListener('click',()=>{const a=loadObras();a.splice(+b.dataset.del,1);try{localStorage.setItem('corteRM_obras',JSON.stringify(a));}catch(e){}renderHistorico();}));}
function openObra(i){const o=loadObras()[i];if(!o)return;const pa=document.getElementById('printArea');pa.classList.remove('hide');pa.innerHTML=snapHTML(o.obra,o.date,o.rows,o.peso,o.telha)+'<div style="margin-top:12px"><button class="btn" id="pPrint">Imprimir</button> <button class="btn ghost" id="pClose">Fechar</button></div>';pa.scrollIntoView({behavior:'smooth'});document.getElementById('pPrint').addEventListener('click',()=>window.print());document.getElementById('pClose').addEventListener('click',()=>pa.classList.add('hide'));}
document.getElementById('print').addEventListener('click',()=>{const pa=document.getElementById('printArea');pa.classList.remove('hide');pa.innerHTML=snapHTML(document.getElementById('obra').value,Date.now(),LASTROWS,LASTPESO,document.getElementById('telhaArea')?.innerText||'');window.print();setTimeout(()=>pa.classList.add('hide'),500);});
document.getElementById('saveObra').addEventListener('click',()=>{if(!LASTROWS.length){return;}const obra=document.getElementById('obra').value||('Obra '+new Date().toLocaleDateString('pt-BR'));const arr=loadObras();arr.unshift({obra,date:Date.now(),rows:LASTROWS,peso:LASTPESO,telha:document.getElementById('telhaArea')?.innerText||''});try{localStorage.setItem('corteRM_obras',JSON.stringify(arr.slice(0,50)));}catch(e){}renderHistorico();const b=document.getElementById('saveObra');b.textContent='Salva!';setTimeout(()=>b.textContent='Salvar obra',1500);});
renderHistorico();
</script>
